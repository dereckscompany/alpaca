                - text: The following changes will be available on
                - strong [ref=e1261]: 2025-08-28 starting at 07:00 UTC
                - text: ":"
              - list [ref=e1262]:
                - listitem [ref=e1263]:
                  - text: The
                  - link "pegged orders" [ref=e1264] [cursor=pointer]:
                    - /url: /docs/binance-spot-api-docs/faqs/pegged_orders
                  - text: functionality will be available.
                  - list [ref=e1265]:
                    - listitem [ref=e1266]:
                      - code [ref=e1267]: pegInstructionsAllowed
                      - text: will be set to
                      - code [ref=e1268]: "true"
                      - text: for all symbols, enabling the use of pegged orders for all APIs.
                    - listitem [ref=e1269]:
                      - text: The following conditional fields
                      - code [ref=e1270]: pegPriceType
                      - text: ","
                      - code [ref=e1271]: pegOffSetType
                      - text: ","
                      - code [ref=e1272]: pegOffsetValues
                      - text: ", and"
                      - code [ref=e1273]: peggedPrice
                      - text: "will appear in responses of the following requests if the order is a pegged order:"
                      - list [ref=e1274]:
                        - listitem [ref=e1275]:
                          - text: REST API
                          - list [ref=e1276]:
                            - listitem [ref=e1277]:
                              - code [ref=e1278]: GET /api/v3/order
                            - listitem [ref=e1279]:
                              - code [ref=e1280]: GET /api/v3/orderList
                            - listitem [ref=e1281]:
                              - code [ref=e1282]: GET /api/v3/openOrderList
                            - listitem [ref=e1283]:
                              - code [ref=e1284]: GET /api/v3/allOrders
                            - listitem [ref=e1285]:
                              - code [ref=e1286]: DELETE /api/v3/order
                            - listitem [ref=e1287]:
                              - code [ref=e1288]: DELETE /api/v3/orderList
                            - listitem [ref=e1289]:
                              - code [ref=e1290]: DELETE /api/v3/openOrders
                            - listitem [ref=e1291]:
                              - code [ref=e1292]: PUT /api/v3/order/amend/keepPriority
                        - listitem [ref=e1293]:
                          - text: WebSocket API
                          - list [ref=e1294]:
                            - listitem [ref=e1295]:
                              - code [ref=e1296]: order.status
                            - listitem [ref=e1297]:
                              - code [ref=e1298]: orderList.status
                            - listitem [ref=e1299]:
                              - code [ref=e1300]: allOrders
                            - listitem [ref=e1301]:
                              - code [ref=e1302]: order.cancel
                            - listitem [ref=e1303]:
                              - code [ref=e1304]: orderList.cancel
                            - listitem [ref=e1305]:
                              - code [ref=e1306]: openOrders.cancelAll
                            - listitem [ref=e1307]:
                              - code [ref=e1308]: order.amend.keepPriority
                    - listitem [ref=e1309]:
                      - text: FIX API
                      - list [ref=e1310]:
                        - listitem [ref=e1311]:
                          - code [ref=e1312]: OrdType(40)
                          - text: supports new value
                          - code [ref=e1313]: P(PEGGED)
                        - listitem [ref=e1314]:
                          - text: Tags
                          - code [ref=e1315]: PegOffsetValue(211)
                          - text: ","
                          - code [ref=e1316]: PegPriceType(1094)
                          - text: ","
                          - code [ref=e1317]: PegMoveType(835)
                          - text: ", and"
                          - code [ref=e1318]: PegOffsetType(836)
                          - text: "have been added to the following messages:"
                          - list [ref=e1319]:
                            - listitem [ref=e1320]:
                              - text: NewOrderSingle
                              - code [ref=e1321]: <D>
                            - listitem [ref=e1322]:
                              - text: NewOrderList
                              - code [ref=e1323]: <E>
                            - listitem [ref=e1324]:
                              - text: OrderCancelRequestAndNewOrderSingle
                              - code [ref=e1325]: <XCN>
                        - listitem [ref=e1326]:
                          - text: When placing an order, the
                          - code [ref=e1327]: ExecutionReport
                          - code [ref=e1328]: <8>
                          - text: message will echo back
                          - code [ref=e1329]: PegInstructions
                          - text: ", with an extra optional field"
                          - code [ref=e1330]: PeggedPrice (839)
                          - text: .
                    - listitem [ref=e1331]:
                      - text: New error messages for pegged orders are added. Please see the
                      - link "Errors" [ref=e1332] [cursor=pointer]:
                        - /url: /docs/binance-spot-api-docs/errors
                      - text: document for more information.
                - listitem [ref=e1333]:
                  - text: Changes with
                  - code [ref=e1334]: recvWindow
                  - text: will be enabled.
                  - list [ref=e1335]:
                    - listitem [ref=e1336]:
                      - text: A third check is performed after your message leaves our message broker, just before it is sent to the Matching Engine.
                      - list [ref=e1337]:
                        - listitem [ref=e1338]: This does not cover potential delays inside the Matching Engine itself.
                    - listitem [ref=e1339]:
                      - code [ref=e1340]: recvWindow
                      - text: supports microseconds.
                      - list [ref=e1341]:
                        - listitem [ref=e1342]: The value is still specified in milliseconds, but it can now include a decimal component for higher precision.
                        - listitem [ref=e1343]:
                          - text: This means the parameter can now support up to
                          - strong [ref=e1344]: three decimal places
                          - text: (e.g., 6000.346).
                        - listitem [ref=e1345]:
                          - text: "APIs affected:"
                          - list [ref=e1346]:
                            - listitem [ref=e1347]: FIX API
                            - listitem [ref=e1348]: REST API
                            - listitem [ref=e1349]: WebSocket API
                - listitem [ref=e1350]:
                  - text: New
                  - link "MAX_NUM_ORDER_LISTS" [ref=e1351] [cursor=pointer]:
                    - /url: /docs/binance-spot-api-docs/filters#max-num-order-lists
                    - code [ref=e1352]: MAX_NUM_ORDER_LISTS
                  - text: filter will be enabled, limiting the number of order lists to 20 per symbol.
                - listitem [ref=e1353]:
                  - text: New
                  - link "MAX_NUM_ORDER_AMENDS" [ref=e1354] [cursor=pointer]:
                    - /url: /docs/binance-spot-api-docs/filters#max_num_order_amends
                    - code [ref=e1355]: MAX_NUM_ORDER_AMENDS
                  - text: filter will be enabled, limiting each order to a maximum of 10 amendments.
              - separator [ref=e1356]
              - heading "2025-08-07Direct link to 2025-08-07" [level=3] [ref=e1357]:
                - text: 2025-08-07
                - link "Direct link to 2025-08-07" [ref=e1358] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2025-08-07
                  - text: "#"
              - list [ref=e1359]:
                - listitem [ref=e1360]:
                  - text: Updated FIX API documentation
                  - list [ref=e1361]:
                    - listitem [ref=e1362]:
