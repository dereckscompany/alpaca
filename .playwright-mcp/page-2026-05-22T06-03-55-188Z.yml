                          - text: On the
                          - code [ref=e4481]: BUY
                          - text: side, the order will buy as many BNB as
                          - code [ref=e4482]: quoteOrderQty
                          - text: BTC can.
                        - listitem [ref=e4483]:
                          - text: On the
                          - code [ref=e4484]: SELL
                          - text: side, the order will sell as much BNB as needed to receive
                          - code [ref=e4485]: quoteOrderQty
                          - text: BTC.
