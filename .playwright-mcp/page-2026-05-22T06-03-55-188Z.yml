                      - text: "with the following fields:"
                      - list [ref=e3440]:
                        - listitem [ref=e3441]:
                          - code [ref=e3442]: preventedMatchId
                        - listitem [ref=e3443]:
                          - code [ref=e3444]: makerOrderId
                        - listitem [ref=e3445]:
                          - code [ref=e3446]: price
                        - listitem [ref=e3447]:
