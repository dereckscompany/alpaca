                - listitem [ref=e771]:
                  - strong [ref=e772]:
                    - text: "SBE: A new schema 3:2 ("
                    - link "spot_3_2.xml" [ref=e773] [cursor=pointer]:
                      - /url: https://github.com/binance/binance-spot-api-docs/blob/master/sbe/schemas/spot_3_2.xml
                    - text: ) is available.
                  - list [ref=e774]:
                    - listitem [ref=e775]:
                      - text: The current schema 3:1 (
                      - link "spot_3_1.xml" [ref=e776] [cursor=pointer]:
                        - /url: https://github.com/binance/binance-spot-api-docs/blob/master/sbe/schemas/spot_3_1.xml
                      - text: ) is deprecated and will be retired in 6 months as per our schema deprecation policy.
                    - listitem [ref=e777]:
                      - text: "Changes in 3:2:"
                      - list [ref=e778]:
                        - listitem [ref=e779]:
                          - text: New enum variant
                          - code [ref=e780]: TRANSFER
                          - text: for
                          - code [ref=e781]: selfTradePreventionMode
                          - text: and
                          - code [ref=e782]: allowedSelfTradePreventionModes
                          - text: .
                        - listitem [ref=e783]:
                          - text: All schemas below 3:1 are unable to represent any response that could contain the STP mode
                          - code [ref=e784]: TRANSFER
                          - text: (e.g. Exchange Information, order placement, order cancellation, or querying the status of an order).
                          - text: When a response cannot be represented in the requested schema, an error is returned.
                - listitem [ref=e785]:
