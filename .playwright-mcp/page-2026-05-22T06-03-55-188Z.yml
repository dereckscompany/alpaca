              - paragraph [ref=e3799]:
                - text: Scheduled changes to the removal of
                - code [ref=e3800]: "!bookTicker"
                - text: around November 2022.
              - list [ref=e3801]:
                - listitem [ref=e3802]:
                  - text: The All Book Tickers stream (
                  - code [ref=e3803]: "!bookTicker"
                  - text: ) is set to be removed in
                  - strong [ref=e3804]: November 2022
                  - text: .
                - listitem [ref=e3805]: More details of the actual removal date will be announced at a later time.
                - listitem [ref=e3806]:
                  - text: Please use the Individual Book Ticker Streams instead. (
                  - code [ref=e3807]: <symbol>@bookTicker
                  - text: ).
                - listitem [ref=e3808]:
                  - text: Multiple
                  - code [ref=e3809]: <symbol>@bookTicker
                  - text: streams can be subscribed to over one connection.
                  - list [ref=e3810]:
                    - listitem [ref=e3811]: "Example: wss://stream.binance.com:9443/stream?streams=btcusdt@bookTicker/bnbbtc@bookTicker"
              - separator [ref=e3812]
