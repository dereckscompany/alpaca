              - paragraph [ref=e341]:
                - strong [ref=e342]: "Action Required:"
              - paragraph [ref=e343]:
                - text: During the update window, existing FIX connections may drop intermittently. To ensure successful reconnections and new connections afterward, please verify before our update that your client sends SNI (Server Name Indication) during the TLS handshake and validates the certificate against the requested hostname.
                - text: Clients without SNI may receive an error message during handshake related to incorrect certificate during or after the update window, leading to TLS handshake or hostname verification failures. This can occur with some Node.js clients if SNI is not explicitly configured.
                - text: Please consult the
                - link "FIX API documentation" [ref=e344] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs/fix-api#general-api-information
