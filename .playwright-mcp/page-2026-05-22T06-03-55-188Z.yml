              - heading "WebSocket APIDirect link to WebSocket API" [level=4] [ref=e1159]:
                - text: WebSocket API
                - link "Direct link to WebSocket API" [ref=e1160] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#websocket-api-2
                  - text: "#"
              - list [ref=e1161]:
                - listitem [ref=e1162]:
                  - text: A single WebSocket connection can subscribe to multiple User Data Streams at once.
                  - list [ref=e1163]:
                    - listitem [ref=e1164]: Only one subscription per account is allowed on a single connection.
                - listitem [ref=e1165]:
                  - text: Method
                  - code [ref=e1166]: userDataStream.subscribe.signature
                  - text: has been added that allows you to subscribe to the User Data Stream without needing to login first.
                  - list [ref=e1167]:
                    - listitem [ref=e1168]:
                      - text: This also doesn’t require an Ed25519 API Key, and can work with any
                      - link "API Key type" [ref=e1169] [cursor=pointer]:
                        - /url: /docs/binance-spot-api-docs/faqs/api_key_types
                      - text: .
                    - listitem [ref=e1170]:
                      - text: For
                      - link "SBE support" [ref=e1171] [cursor=pointer]:
                        - /url: /docs/binance-spot-api-docs/faqs/sbe_faq
                      - text: ", you need to use at least schema 3:1."
                - listitem [ref=e1172]:
                  - text: Method
                  - code [ref=e1173]: session.subscriptions
                  - text: has been added to list all active subscriptions for the current session.
                - listitem [ref=e1174]:
                  - text: The meaning of the field
                  - code [ref=e1175]: userDataStream
                  - text: in the session requests has changed slightly.
                  - list [ref=e1176]:
                    - listitem [ref=e1177]:
                      - text: Previously, this returned
                      - code [ref=e1178]: "true"
                      - text: if you were subscribed to the user data stream of your logged-on account.
                    - listitem [ref=e1179]:
                      - text: Now returns
                      - code [ref=e1180]: "true"
                      - text: if you have at least one active user data stream subscription, otherwise
                      - code [ref=e1181]: "false"
                      - text: .
                - listitem [ref=e1182]:
                  - code [ref=e1183]: userDataStream.unsubscribe
                  - text: supports closing multiple subscriptions.
                  - list [ref=e1184]:
                    - listitem [ref=e1185]: When called with no parameter, this will close all subscriptions.
                    - listitem [ref=e1186]:
                      - text: When called with
                      - code [ref=e1187]: subscriptionId
                      - text: ", this will attempt to close the subscription matching that Id, if it exists."
                    - listitem [ref=e1188]:
                      - text: The authorization for this request has been changed to
                      - code [ref=e1189]: NONE
                      - text: .
                - listitem [ref=e1190]:
                  - text: Field
                  - code [ref=e1191]: subscriptionId
                  - text: has been added to the User Data Stream events payload when listening through the
                  - link "WebSocket API" [ref=e1192] [cursor=pointer]:
                    - /url: /docs/binance-spot-api-docs/websocket-api/user-data-stream-requests#user-data-stream-subscribe
                  - text: . This will identify which subscription the event is coming from.
