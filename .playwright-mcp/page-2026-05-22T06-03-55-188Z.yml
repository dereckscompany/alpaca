              - paragraph [ref=e4800]: SYSTEM IMPROVEMENTS
              - list [ref=e4801]:
                - listitem [ref=e4802]: Matching Engine stability/reliability improvements.
                - listitem [ref=e4803]: Rest API performance improvements.
              - separator [ref=e4804]
              - heading "2018-11-13Direct link to 2018-11-13" [level=3] [ref=e4805]:
                - text: 2018-11-13
                - link "Direct link to 2018-11-13" [ref=e4806] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2018-11-13
                  - text: "#"
              - paragraph [ref=e4807]: REST API
              - list [ref=e4808]:
                - listitem [ref=e4809]: Can now cancel orders through the Rest API during a trading ban.
                - listitem [ref=e4810]:
                  - text: "New filters:"
                  - code [ref=e4811]: PERCENT_PRICE
                  - text: ","
                  - code [ref=e4812]: MARKET_LOT_SIZE
                  - text: ","
                  - code [ref=e4813]: MAX_NUM_ICEBERG_ORDERS
                  - text: .
                - listitem [ref=e4814]:
                  - text: Added
                  - code [ref=e4815]: RAW_REQUESTS
                  - text: rate limit. Limits based on the number of requests over X minutes regardless of weight.
                - listitem [ref=e4816]: /api/v3/ticker/price increased to weight of 2 for a no symbol query.
                - listitem [ref=e4817]: /api/v3/ticker/bookTicker increased weight of 2 for a no symbol query.
                - listitem [ref=e4818]: DELETE /api/v3/order will now return an execution report of the final state of the order.
                - listitem [ref=e4819]:
                  - code [ref=e4820]: MIN_NOTIONAL
                  - text: "filter has two new parameters:"
                  - code [ref=e4821]: applyToMarket
                  - text: (whether or not the filter is applied to MARKET orders) and
                  - code [ref=e4822]: avgPriceMins
                  - text: (the number of minutes over which the price averaged for the notional estimation).
                - listitem [ref=e4823]:
                  - code [ref=e4824]: intervalNum
                  - text: added to /api/v1/exchangeInfo limits.
                  - code [ref=e4825]: intervalNum
                  - text: "describes the amount of the interval. For example:"
                  - code [ref=e4826]: intervalNum
                  - text: 5, with
                  - code [ref=e4827]: interval
                  - text: minute, means "every 5 minutes".
              - heading "Explanation for the average price calculation:Direct link to Explanation for the average price calculation:" [level=4] [ref=e4828]:
                - text: "Explanation for the average price calculation:"
                - link "Direct link to Explanation for the average price calculation:" [ref=e4829] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#explanation-for-the-average-price-calculation
                  - text: "#"
              - list [ref=e4830]:
                - listitem [ref=e4831]:
                  - paragraph [ref=e4832]: (qty * price) of all trades / sum of qty of all trades over previous 5 minutes.
                - listitem [ref=e4833]:
                  - paragraph [ref=e4834]: If there is no trade in the last 5 minutes, it takes the first trade that happened outside of the 5min window. For example if the last trade was 20 minutes ago, that trade's price is the 5 min average.
                - listitem [ref=e4835]:
                  - paragraph [ref=e4836]:
                    - text: If there is no trade on the symbol, there is no average price and market orders cannot be placed. On a new symbol with
                    - code [ref=e4837]: applyToMarket
                    - text: enabled on the
                    - code [ref=e4838]: MIN_NOTIONAL
                    - text: filter, market orders cannot be placed until there is at least 1 trade.
                - listitem [ref=e4839]:
                  - paragraph [ref=e4840]:
                    - text: "The current average price can be checked here:"
                    - code [ref=e4841]: https://api.binance.com/api/v3/avgPrice?symbol=<symbol>
                    - text: "For example:"
                    - link "https://api.binance.com/api/v3/avgPrice?symbol=BNBUSDT" [ref=e4842] [cursor=pointer]:
                      - /url: https://api.binance.com/api/v3/avgPrice?symbol=BNBUSDT
              - paragraph [ref=e4843]: USER DATA STREAM
              - list [ref=e4844]:
                - listitem [ref=e4845]:
                  - code [ref=e4846]: Last quote asset transacted quantity
                  - text: (as variable
                  - code [ref=e4847]: "Y"
                  - text: ) added to execution reports. Represents the
                  - code [ref=e4848]: lastPrice
                  - text: "*"
                  - code [ref=e4849]: lastQty
                  - text: (
                  - code [ref=e4850]: L
                  - text: "*"
                  - code [ref=e4851]: l
                  - text: ).
