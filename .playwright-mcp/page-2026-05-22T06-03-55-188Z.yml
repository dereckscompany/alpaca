                  - text: "#"
              - paragraph [ref=e3815]: Note that these are rolling changes, so it may take a few days for it to rollout to all our servers.
              - list [ref=e3816]:
                - listitem [ref=e3817]:
                  - text: Changes to
                  - code [ref=e3818]: GET /api/v3/exchangeInfo
                  - list [ref=e3819]:
                    - listitem [ref=e3820]:
                      - text: New optional parameter
                      - code [ref=e3821]: permissions
                      - text: added to display all symbols with the permissions matching the parameter provided. (eg.
                      - code [ref=e3822]: SPOT
                      - text: ","
                      - code [ref=e3823]: MARGIN
                      - text: )
                    - listitem [ref=e3824]:
                      - text: If not provided, the default value will be
                      - code [ref=e3825]: "[\"SPOT\",\"MARGIN\",\"LEVERAGED\"]"
                      - text: .
                      - list [ref=e3826]:
                        - listitem [ref=e3827]:
                          - text: This means the request
                          - code [ref=e3828]: GET /api/v3/exchangeInfo
                          - text: without any parameters will show all symbols that can be used for
                          - code [ref=e3829]: SPOT
                          - text: ","
                          - code [ref=e3830]: MARGIN
                          - text: ", and/or"
                          - code [ref=e3831]: LEVERAGED
                          - text: trading.
                        - listitem [ref=e3832]:
                          - text: To search for symbols that can be traded on other permissions (e.g.
                          - code [ref=e3833]: TRD_GRP_004
                          - text: ", etc), then this needs to be searched for explicitly. (e.g."
                          - code [ref=e3834]: permissions
                          - text: =
                          - code [ref=e3835]: TRD_GRP_004
                          - text: )
                    - listitem [ref=e3836]:
                      - text: Cannot be combined with
                      - code [ref=e3837]: symbol
                      - text: or
                      - code [ref=e3838]: symbols
