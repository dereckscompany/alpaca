              - paragraph [ref=e4133]: REST API
              - list [ref=e4134]:
                - listitem [ref=e4135]:
                  - text: Trailing Stops have been enabled.
                  - list [ref=e4136]:
                    - listitem [ref=e4137]:
                      - text: This is a type of algo order where the activation is based on a percentage of a price change in the market using the new parameter
                      - code [ref=e4138]: trailingDelta
                      - text: .
                    - listitem [ref=e4139]:
                      - text: "This can only used with any of the following order types:"
                      - code [ref=e4140]: STOP_LOSS
                      - text: ","
                      - code [ref=e4141]: STOP_LOSS_LIMIT
                      - text: ","
                      - code [ref=e4142]: TAKE_PROFIT
                      - text: ","
                      - code [ref=e4143]: TAKE_PROFIT_LIMIT
                      - text: .
                    - listitem [ref=e4144]:
                      - text: The
                      - code [ref=e4145]: trailingDelta
                      - text: parameter will be done in Basis Points or BIPS.
                      - list [ref=e4146]:
                        - listitem [ref=e4147]:
                          - text: "For example: a STOP_LOSS SELL order with a"
                          - code [ref=e4148]: trailingDelta
                          - text: of 100 will trigger after a price decrease of 1% from the highest price after the order is placed. (100 / 10,000 => 0.01 => 1%)
                    - listitem [ref=e4149]:
                      - text: When used in combination with OCO Orders, the
                      - code [ref=e4150]: trailingDelta
                      - text: will determine when the contingent leg of the OCO will trigger.
                    - listitem [ref=e4151]:
                      - text: When
                      - code [ref=e4152]: trailingDelta
                      - text: is used in combination with
                      - code [ref=e4153]: stopPrice
                      - text: ", once the"
                      - code [ref=e4154]: stopPrice
                      - text: condition is met, the trailing stop starts tracking the price change from the
                      - code [ref=e4155]: stopPrice
                      - text: based on the
                      - code [ref=e4156]: trailingDelta
                      - text: provided.
                    - listitem [ref=e4157]:
                      - text: When no
                      - code [ref=e4158]: stopPrice
                      - text: is sent, the trailing stop starts tracking the price changes from the last price based on the
                      - code [ref=e4159]: trailingDelta
                      - text: provided.
                - listitem [ref=e4160]:
                  - text: Changes to POST
                  - code [ref=e4161]: /api/v3/order
