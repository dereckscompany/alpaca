                  - text: "New filter:"
                  - code [ref=e4858]: ICEBERG_PARTS
                - listitem [ref=e4859]:
                  - code [ref=e4860]: POST api/v3/order
                  - text: new defaults for
                  - code [ref=e4861]: newOrderRespType
                  - text: .
                  - code [ref=e4862]: ACK
                  - text: ","
                  - code [ref=e4863]: RESULT
                  - text: ", or"
                  - code [ref=e4864]: FULL
                  - text: ;
                  - code [ref=e4865]: MARKET
                  - text: and
                  - code [ref=e4866]: LIMIT
                  - text: order types default to
                  - code [ref=e4867]: FULL
                  - text: ", all other orders default to"
                  - code [ref=e4868]: ACK
                  - text: .
                - listitem [ref=e4869]:
                  - text: POST api/v3/order
                  - code [ref=e4870]: RESULT
                  - text: and
                  - code [ref=e4871]: FULL
                  - text: responses now have
                  - code [ref=e4872]: cummulativeQuoteQty
                - listitem [ref=e4873]: GET api/v3/openOrders with no symbol weight reduced to 40.
                - listitem [ref=e4874]: GET api/v3/ticker/24hr with no symbol weight reduced to 40.
                - listitem [ref=e4875]: Max amount of trades from GET /api/v1/trades increased to 1000.
                - listitem [ref=e4876]: Max amount of trades from GET /api/v1/historicalTrades increased to 1000.
                - listitem [ref=e4877]: Max amount of aggregate trades from GET /api/v1/aggTrades increased to 1000.
                - listitem [ref=e4878]: Max amount of aggregate trades from GET /api/v1/klines increased to 1000.
                - listitem [ref=e4879]:
                  - text: Rest API Order lookups now return
                  - code [ref=e4880]: updateTime
                  - text: which represents the last time the order was updated;
                  - code [ref=e4881]: time
                  - text: is the order creation time.
                - listitem [ref=e4882]:
                  - text: Order lookup endpoints will now return
                  - code [ref=e4883]: cummulativeQuoteQty
                  - text: . If
                  - code [ref=e4884]: cummulativeQuoteQty
                  - text: is < 0, it means the data isn't available for this order at this time.
                - listitem [ref=e4885]:
                  - code [ref=e4886]: REQUESTS
                  - text: rate limit type changed to
                  - code [ref=e4887]: REQUEST_WEIGHT
                  - text: . This limit was always logically request weight and the previous name for it caused confusion.
              - paragraph [ref=e4888]: USER DATA STREAM
              - list [ref=e4889]:
                - listitem [ref=e4890]:
                  - code [ref=e4891]: cummulativeQuoteQty
                  - text: field added to order responses and execution reports (as variable
                  - code [ref=e4892]: Z
                  - text: ). Represents the cummulative amount of the
                  - code [ref=e4893]: quote
                  - text: that has been spent (with a
                  - code [ref=e4894]: BUY
                  - text: order) or received (with a
                  - code [ref=e4895]: SELL
                  - text: order). Historical orders will have a value < 0 in this field indicating the data is not available at this time.
                  - code [ref=e4896]: cummulativeQuoteQty
                  - text: divided by
                  - code [ref=e4897]: cummulativeQty
                  - text: will give the average price for an order.
                - listitem [ref=e4898]:
                  - code [ref=e4899]: O
                  - text: (order creation time) added to execution reports
