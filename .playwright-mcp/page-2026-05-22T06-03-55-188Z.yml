                - listitem [ref=e1370]:
                  - text: Beginning at
                  - strong [ref=e1371]: 2025-07-08 07:00 UTC
                  - text: ","
                  - link "WebSocket Streams" [ref=e1372] [cursor=pointer]:
                    - /url: /docs/binance-spot-api-docs/web-socket-streams
                  - text: will be upgraded.
                - listitem [ref=e1373]:
                  - text: During the upgrade,
                  - strong [ref=e1374]: existing and new connections may be disconnected in less than 24 hours
                  - text: .
                - listitem [ref=e1375]: The upgrade may take up to 2 hours; We apologize for the inconvenience.
              - separator [ref=e1376]
              - heading "2025-06-04Direct link to 2025-06-04" [level=3] [ref=e1377]:
                - text: 2025-06-04
                - link "Direct link to 2025-06-04" [ref=e1378] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2025-06-04
                  - text: "#"
              - paragraph [ref=e1379]: "REST and WebSocket API:"
              - list [ref=e1380]:
                - listitem [ref=e1381]:
                  - text: Reminder that SBE 2:0 schema will be retired on 2025-06-12,
                  - link "6 months after being deprecated" [ref=e1382] [cursor=pointer]:
                    - /url: /docs/binance-spot-api-docs/faqs/sbe_faq#sbe-schema
                  - text: .
                - listitem [ref=e1383]:
                  - text: The
                  - link "SBE lifecycle for Production" [ref=e1384] [cursor=pointer]:
                    - /url: https://github.com/binance/binance-spot-api-docs/blob/master/sbe/schemas/sbe_schema_lifecycle_prod.json
                  - text: has been updated to reflect this change.
              - separator [ref=e1385]
              - heading "2025-05-28Direct link to 2025-05-28" [level=3] [ref=e1386]:
                - text: 2025-05-28
                - link "Direct link to 2025-05-28" [ref=e1387] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2025-05-28
                  - text: "#"
              - list [ref=e1388]:
                - listitem [ref=e1389]:
                  - text: "Documented API timeout value and error under General API Information for each API:"
                  - list [ref=e1390]:
                    - listitem [ref=e1391]:
                      - link "FIX" [ref=e1392] [cursor=pointer]:
                        - /url: /docs/binance-spot-api-docs/fix-api#general-api-information
                    - listitem [ref=e1393]:
                      - link "REST" [ref=e1394] [cursor=pointer]:
