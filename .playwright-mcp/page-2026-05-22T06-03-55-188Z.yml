              - paragraph [ref=e3880]: REST API
              - list [ref=e3881]:
                - listitem [ref=e3882]:
                  - text: Changes to
                  - code [ref=e3883]: POST /api/v3/order
                  - text: and
                  - code [ref=e3884]: POST /api/v3/order/cancelReplace
                  - list [ref=e3885]:
                    - listitem [ref=e3886]:
                      - text: New optional fields
                      - code [ref=e3887]: strategyId
                      - text: and
                      - code [ref=e3888]: strategyType
                      - list [ref=e3889]:
                        - listitem [ref=e3890]:
                          - code [ref=e3891]: strategyId
                          - text: is a parameter used to identify an order as part of a strategy.
                        - listitem [ref=e3892]:
                          - code [ref=e3893]: strategyType
                          - text: is a parameter used to identify what strategy was running. (E.g. If all the orders are part of spot grid strategy, it can be set to
                          - code [ref=e3894]: strategyType=1000000
                          - text: )
                          - list [ref=e3895]:
                            - listitem [ref=e3896]:
                              - text: Note that the minimum value allowed for
                              - code [ref=e3897]: strategyType
                              - text: is
                              - code [ref=e3898]: "1000000"
                              - text: .
                - listitem [ref=e3899]:
                  - text: Changes to
                  - code [ref=e3900]: POST /api/v3/order/oco
                  - list [ref=e3901]:
                    - listitem [ref=e3902]:
                      - text: New optional fields
                      - code [ref=e3903]: limitStrategyId
                      - text: ","
                      - code [ref=e3904]: limitStrategyType
                      - text: ","
                      - code [ref=e3905]: stopStrategyId
                      - text: ","
                      - code [ref=e3906]: stopStrategyType
                    - listitem [ref=e3907]: These are the strategy metadata parameters for both legs of the OCO orders.
                    - listitem [ref=e3908]:
                      - code [ref=e3909]: limitStrategyType
                      - text: and
                      - code [ref=e3910]: stopStrategyType
                      - text: both cannot be less than
                      - code [ref=e3911]: "1000000"
                      - text: .
                - listitem [ref=e3912]:
                  - text: Changes to
                  - code [ref=e3913]: GET /api/v3/order
                  - text: ","
                  - code [ref=e3914]: GET /api/v3/openOrders
                  - text: ", and"
                  - code [ref=e3915]: GET /api/v3/allOrders
                  - list [ref=e3916]:
                    - listitem [ref=e3917]:
                      - text: New fields
                      - code [ref=e3918]: strategyId
                      - text: and
                      - code [ref=e3919]: strategyType
                      - text: will appear in the response JSON for orders that had these fields populated upon order placement.
                - listitem [ref=e3920]:
                  - text: Changes to
                  - code [ref=e3921]: DELETE /api/v3/order
                  - text: and
                  - code [ref=e3922]: DELETE /api/v3/openOrders
                  - list [ref=e3923]:
                    - listitem [ref=e3924]:
                      - text: New fields
                      - code [ref=e3925]: strategyId
                      - text: and
                      - code [ref=e3926]: strategyType
                      - text: will appear in the response JSON for cancelled orders that had these fields populated upon order placement.
              - paragraph [ref=e3927]: USER DATA STREAM
              - list [ref=e3928]:
                - listitem [ref=e3929]:
                  - text: New fields to eventType
