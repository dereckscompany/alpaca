                    - listitem [ref=e3935]:
                      - code [ref=e3936]: J
                      - text: for
                      - code [ref=e3937]: strategyType
                    - listitem [ref=e3938]: Note that these fields only appear if these were populated upon order placement.
              - separator [ref=e3939]
              - heading "2022-06-20Direct link to 2022-06-20" [level=3] [ref=e3940]:
                - text: 2022-06-20
                - link "Direct link to 2022-06-20" [ref=e3941] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2022-06-20
                  - text: "#"
              - paragraph [ref=e3942]:
                - text: Changes to
                - code [ref=e3943]: GET /api/v3/ticker
              - list [ref=e3944]:
                - listitem [ref=e3945]:
                  - text: Weight has been reduced from 5 to 2 per symbol, regardless of
                  - code [ref=e3946]: windowSize
                  - text: .
                - listitem [ref=e3947]:
                  - text: The max number of symbols that can be processed in a request is 100.
                  - list [ref=e3948]:
                    - listitem [ref=e3949]:
                      - text: If the number of
                      - code [ref=e3950]: symbols
                      - text: "sent is more than 100, the error will be as follows:"
                  - generic [ref=e3952]:
                    - code [ref=e3954]:
                      - generic [ref=e3955]: "{"
                      - generic [ref=e3956]: "\"code\": -1101,"
                      - generic [ref=e3957]: "\"msg\": \"Too many values sent for parameter 'symbols', maximum allowed up to 100.\""
                      - generic [ref=e3958]: "}"
                    - button "Copy code to clipboard" [ref=e3960] [cursor=pointer]:
                      - generic [ref=e3961]:
                        - img [ref=e3962]
                        - img [ref=e3964]
                - listitem [ref=e3966]:
                  - text: The max Weight for this endpoint will cap at 100.
                  - list [ref=e3967]:
                    - listitem [ref=e3968]:
                      - text: I.e. If the request has more than 50 symbols, the Weight will still be 100, regardless of
                      - code [ref=e3969]: windowSize
                      - text: .
              - separator [ref=e3970]
              - heading "2022-06-15Direct link to 2022-06-15" [level=3] [ref=e3971]:
                - text: 2022-06-15
                - link "Direct link to 2022-06-15" [ref=e3972] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2022-06-15
                  - text: "#"
              - paragraph [ref=e3973]:
                - strong [ref=e3974]: "Note:"
                - text: The update is being rolled out over the next few days, so these changes may not be visible right away.
              - paragraph [ref=e3975]: SPOT API
              - list [ref=e3976]:
                - listitem [ref=e3977]:
                  - code [ref=e3978]: GET /api/v3/ticker
                  - text: added
                  - list [ref=e3979]:
                    - listitem [ref=e3980]:
                      - text: Rolling window price change statistics based on
                      - code [ref=e3981]: windowSize
                      - text: provided.
                    - listitem [ref=e3982]:
                      - text: Contrary to
                      - code [ref=e3983]: GET /api/v3/ticker/24hr
                      - text: the list of symbols cannot be omitted.
                    - listitem [ref=e3984]:
                      - text: If
                      - code [ref=e3985]: windowSize
                      - text: not specified, the value will default to
                      - code [ref=e3986]: 1d
                      - text: .
                    - listitem [ref=e3987]:
                      - text: Response is similar to
                      - code [ref=e3988]: GET /api/v3/ticker/24hr
                      - text: ", minus the following fields:"
                      - code [ref=e3989]: prevClosePrice
                      - text: ","
                      - code [ref=e3990]: lastQty
                      - text: ","
                      - code [ref=e3991]: bidPrice
                      - text: ","
                      - code [ref=e3992]: bidQty
                      - text: ","
                      - code [ref=e3993]: askPrice
                      - text: ","
                      - code [ref=e3994]: askQty
                - listitem [ref=e3995]:
                  - code [ref=e3996]: GET /api/v3/exchangeInfo
                  - text: returns new field
                  - code [ref=e3997]: cancelReplaceAllowed
                  - text: in
                  - code [ref=e3998]: symbols
                  - text: list.
                - listitem [ref=e3999]:
                  - code [ref=e4000]: POST /api/v3/order/cancelReplace
                  - text: added
                  - list [ref=e4001]:
                    - listitem [ref=e4002]: Cancels an existing order and places a new order on the same symbol.
                    - listitem [ref=e4003]:
                      - text: The filters are evaluated
                      - strong [ref=e4004]: before
                      - text: the cancel order is placed.
                      - list [ref=e4005]:
                        - listitem [ref=e4006]:
                          - text: e.g. If the
                          - code [ref=e4007]: MAX_NUM_ORDERS
                          - text: filter is 10, and the total number of open orders on the account is also 10, when using
                          - code [ref=e4008]: POST /api/v3/order/cancelReplace
                          - text: both the cancel order placement and new order will fail because of the filter.
                    - listitem [ref=e4009]: The change is being rolled out in the next few days, thus this feature will be enabled once the upgrade is completed.
                - listitem [ref=e4010]:
                  - text: New filter
                  - code [ref=e4011]: NOTIONAL
                  - text: has been added.
                  - list [ref=e4012]:
                    - listitem [ref=e4013]:
                      - text: Defines the allowed notional value (
                      - code [ref=e4014]: price * quantity
                      - text: ) based on a configured
                      - code [ref=e4015]: minNotional
                      - text: and
                      - code [ref=e4016]: maxNotional
                - listitem [ref=e4017]:
                  - text: New exchange filter
                  - code [ref=e4018]: EXCHANGE_MAX_NUM_ICEBERG_ORDERS
                  - text: has been added.
                  - list [ref=e4019]:
                    - listitem [ref=e4020]: Defines the limit of open iceberg orders on an account
              - separator [ref=e4021]
              - heading "2022-05-23Direct link to 2022-05-23" [level=3] [ref=e4022]:
                - text: 2022-05-23
                - link "Direct link to 2022-05-23" [ref=e4023] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2022-05-23
                  - text: "#"
              - list [ref=e4024]:
                - listitem [ref=e4025]:
                  - paragraph [ref=e4026]: Changes to Order Book Depth Levels
                  - list [ref=e4027]:
                    - listitem [ref=e4028]: Quantities in the Depth levels were returning negative values in situations where they were exceeding the max value, resulting in an overflow.
                    - listitem [ref=e4029]:
                      - text: Going forward depth levels will not overflow, but will be capped at the max value based on the precision of the base asset. This means that the depth level is at max value
                      - emphasis [ref=e4030]: or more
                      - text: .
                      - list [ref=e4031]:
                        - listitem [ref=e4032]: E.g. If the precision is 8, then the max value for quantity will be at 92,233,720,368.54775807.
                    - listitem [ref=e4033]: When the fix has been applied, a change in the order book at the affected price level is required for the changes to be visible.
                - listitem [ref=e4034]:
                  - paragraph [ref=e4035]: What does this affect?
                  - list [ref=e4036]:
                    - listitem [ref=e4037]:
                      - text: SPOT API
                      - list [ref=e4038]:
                        - listitem [ref=e4039]:
                          - code [ref=e4040]: GET /api/v3/depth
                    - listitem [ref=e4041]:
                      - text: Websocket Streams
