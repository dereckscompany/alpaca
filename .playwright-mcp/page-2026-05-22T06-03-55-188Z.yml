                  - text: will thus be deprecated, and retired from the API in 6 months as per our schema deprecation policy.
                - listitem [ref=e2313]: When using schema 1:0 on REST API or WebSocket API, group "permissions" in message "ExchangeInfoResponse" will always be empty. Upgrade to schema 2:0 to find permission information in group "permissionSets". See General changes above for more details.
                - listitem [ref=e2314]: Deprecated OCO requests will still be supported by the latest schema.
                - listitem [ref=e2315]: Note that trying to use schema 2:0 before it is actually released will result in an error.
