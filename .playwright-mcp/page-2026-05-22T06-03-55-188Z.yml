                      - text: Quote Order Qty
                      - code [ref=e4474]: MARKET
                      - text: orders will not break
                      - code [ref=e4475]: LOT_SIZE
                      - text: filter rules; the order will execute a quantity that will have the notional value as close as possible to
                      - code [ref=e4476]: quoteOrderQty
                      - text: .
                    - listitem [ref=e4477]:
                      - text: Using
                      - code [ref=e4478]: BNBBTC
                      - text: "as an example:"
                      - list [ref=e4479]:
