                    - listitem [ref=e3424]:
                      - code [ref=e3425]: orderList.place
                    - listitem [ref=e3426]:
                      - code [ref=e3427]: order.cancelReplace
                - listitem [ref=e3428]:
                  - text: "New request:"
                  - code [ref=e3429]: myPreventedMatches
                  - text: "- This queries the orders that expired due to STP being triggered."
                - listitem [ref=e3430]:
                  - text: New responses that will appear for all order placement endpoints if there was a prevented match (i.e. if an order could have matched with an order of the same account, or the accounts are in the same
                  - code [ref=e3431]: tradeGroupId
                  - text: "):"
                  - list [ref=e3432]:
                    - listitem [ref=e3433]:
                      - code [ref=e3434]: tradeGroupId
