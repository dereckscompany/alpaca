              - separator [ref=e1397]
              - heading "2025-05-22Direct link to 2025-05-22" [level=3] [ref=e1398]:
                - text: 2025-05-22
                - link "Direct link to 2025-05-22" [ref=e1399] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2025-05-22
                  - text: "#"
              - paragraph [ref=e1400]:
                - strong [ref=e1401]: "Notice: The following changes will happen at 2025-06-06 7:00 UTC."
              - list [ref=e1402]:
                - listitem [ref=e1403]:
                  - text: The previous behavior of
                  - code [ref=e1404]: recvWindow
                  - text: on FIX, REST, and WebSocket APIs will be augmented by an additional check.
                  - list [ref=e1405]:
                    - listitem [ref=e1406]:
                      - text: "To review, the existing behavior is:"
                      - list [ref=e1407]:
                        - listitem [ref=e1408]:
                          - text: If
                          - code [ref=e1409]: timestamp
                          - text: is greater than
                          - code [ref=e1410]: serverTime
                          - text: + 1 second at receipt of the request, the request is rejected. Rejection by this check increments message limits (FIX API) and IP limits (REST and WebSocket APIs), but not Unfilled Order Count (order placement endpoints of all APIs).
                        - listitem [ref=e1411]:
                          - text: If the difference between
                          - code [ref=e1412]: timestamp
                          - text: and
                          - code [ref=e1413]: serverTime
                          - text: at receipt of the request is greater than
                          - code [ref=e1414]: recvWindow
                          - text: ", the request is rejected. Rejection by this check increments message limits (FIX API) and IP limits (REST and WebSocket APIs) but not Unfilled Order Count (order placement endpoints of all APIs)."
                    - listitem [ref=e1415]:
                      - text: "The additional check is:"
                      - list [ref=e1416]:
                        - listitem [ref=e1417]:
                          - text: Just before a request is forwarded to the Matching Engine, if the difference between
                          - code [ref=e1418]: timestamp
                          - text: and the current
                          - code [ref=e1419]: serverTime
                          - text: is greater than
                          - code [ref=e1420]: recvWindow
                          - text: ", the request is rejected. Rejection by this check increments message limits (FIX API), IP limits (REST and WebSocket APIs), and Unfilled Order Count (order placement endpoints of all APIs)."
                    - listitem [ref=e1421]:
                      - text: The documentation for Timing security has been updated to reflect the additional check.
                      - list [ref=e1422]:
                        - listitem [ref=e1423]:
                          - link "REST API" [ref=e1424] [cursor=pointer]:
                            - /url: /docs/binance-spot-api-docs/rest-api/request-security#timing-security
                        - listitem [ref=e1425]:
                          - link "WebSocket API" [ref=e1426] [cursor=pointer]:
                            - /url: /docs/binance-spot-api-docs/websocket-api/request-security#timing-security
                        - listitem [ref=e1427]:
                          - link "FIX API" [ref=e1428] [cursor=pointer]:
                            - /url: /docs/binance-spot-api-docs/fix-api#timing-security
                - listitem [ref=e1429]:
                  - text: Fixed a bug in FIX Market Data message InstrumentList
                  - code [ref=e1430]: <y>
                  - text: . Previously, the value of
                  - code [ref=e1431]: NoRelatedSym(146)
                  - text: could have been incorrect.
              - separator [ref=e1432]
              - heading "2025-04-29Direct link to 2025-04-29" [level=3] [ref=e1433]:
                - text: 2025-04-29
                - link "Direct link to 2025-04-29" [ref=e1434] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2025-04-29
                  - text: "#"
              - list [ref=e1435]:
                - listitem [ref=e1436]:
                  - text: Features that currently require an Ed25519 API key will soon be opened up to HMAC and RSA keys.
                  - list [ref=e1437]:
                    - listitem [ref=e1438]: For example, subscribing to User Data Stream in WebSocket API will be possible with any API key type before listenKeys are removed.
                    - listitem [ref=e1439]: Users are still encouraged to migrate to Ed25519 API keys as they are more secure and performant on Binance Spot Trading.
                    - listitem [ref=e1440]: More details to come.
              - separator [ref=e1441]
              - heading "2025-04-25Direct link to 2025-04-25" [level=3] [ref=e1442]:
                - text: 2025-04-25
                - link "Direct link to 2025-04-25" [ref=e1443] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2025-04-25
                  - text: "#"
              - list [ref=e1444]:
                - listitem [ref=e1445]:
                  - text: "The following request weights have been increased from 1 to 4:"
                  - list [ref=e1446]:
                    - listitem [ref=e1447]:
                      - text: "REST API:"
                      - code [ref=e1448]: PUT /api/v3/order/amend/keepPriority
                    - listitem [ref=e1449]:
                      - text: "WebSocket API:"
                      - code [ref=e1450]: order.amend.keepPriority
                    - listitem [ref=e1451]: The documentation for both REST and WebSocket API has been updated to reflect these changes.
                - listitem [ref=e1452]:
                  - text: Clarified that
                  - code [ref=e1453]: SEQNUM
                  - text: in the FIX-API is a 32-bit unsigned integer that rolls over. This has been the
                  - code [ref=e1454]: SEQNUM
                  - text: data type since the inception of the FIX-API.
              - separator [ref=e1455]
              - heading "2025-04-21Direct link to 2025-04-21" [level=3] [ref=e1456]:
                - text: 2025-04-21
                - link "Direct link to 2025-04-21" [ref=e1457] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2025-04-21
                  - text: "#"
              - paragraph [ref=e1458]:
                - strong [ref=e1459]:
                  - text: Clarification on the release of
                  - link "Order Amend Keep Priority" [ref=e1460] [cursor=pointer]:
                    - /url: /docs/binance-spot-api-docs/faqs/order_amend_keep_priority
                  - text: and
                  - link "STP Decrement" [ref=e1461] [cursor=pointer]:
                    - /url: /docs/binance-spot-api-docs/faqs/stp_faq
                  - text: ":"
              - list [ref=e1462]:
                - listitem [ref=e1463]:
                  - text: At
                  - strong [ref=e1464]: 2025-05-07 07:00 UTC
                  - list [ref=e1465]:
                    - listitem [ref=e1466]: Order Amend Keep Priority will be enabled on all symbols.
                    - listitem [ref=e1467]: STP Decrement will be allowed on all symbols.
                - listitem [ref=e1468]:
                  - text: At
                  - strong [ref=e1469]: 2025-04-24, 07:00 UTC
                  - text: ", the field"
                  - code [ref=e1470]: amendAllowed
                  - text: will become visible on Exchange Information requests, but the feature will not be enabled yet.
                - listitem [ref=e1471]:
                  - link "SPOT Testnet" [ref=e1472] [cursor=pointer]:
                    - /url: https://testnet.binance.vision/
                  - text: has both features enabled/allowed on all symbols.
              - separator [ref=e1473]
              - heading "2025-04-08Direct link to 2025-04-08" [level=3] [ref=e1474]:
                - text: 2025-04-08
                - link "Direct link to 2025-04-08" [ref=e1475] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2025-04-08
                  - text: "#"
              - paragraph [ref=e1476]:
                - strong [ref=e1477]: "Notice:"
                - text: The changes in this section will be gradually rolled out, and will take a week to complete.
              - list [ref=e1478]:
                - listitem [ref=e1479]:
                  - text: New Error code
                  - code [ref=e1480]: "-2039"
                  - text: where if querying an order with both
                  - code [ref=e1481]: orderId
                  - text: and
                  - code [ref=e1482]: origClientOrderId
                  - text: and no order is found with this combination.
                  - list [ref=e1483]:
                    - listitem [ref=e1484]:
                      - text: "Affected requests:"
                      - list [ref=e1485]:
                        - listitem [ref=e1486]:
                          - text: "REST API:"
                          - code [ref=e1487]: GET /api/v3/order
                        - listitem [ref=e1488]:
                          - text: "WebSocket API:"
                          - code [ref=e1489]: order.status
                - listitem [ref=e1490]:
                  - text: The
                  - link "Errors Documentation" [ref=e1491] [cursor=pointer]:
                    - /url: /docs/binance-spot-api-docs/errors
                  - text: has also been updated with the new error messages for code
                  - code [ref=e1492]: "-1034"
                  - text: when the FIX connection rate limits have exceeded. (More details can be found in yesterday's
                  - link "update" [ref=e1493] [cursor=pointer]:
                    - /url: /docs/binance-spot-api-docs#2025-04-07
                  - text: )
              - separator [ref=e1494]
              - heading "2025-04-07Direct link to 2025-04-07" [level=3] [ref=e1495]:
                - text: 2025-04-07
                - link "Direct link to 2025-04-07" [ref=e1496] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2025-04-07
                  - text: "#"
              - heading "General ChangesDirect link to General Changes" [level=4] [ref=e1497]:
                - text: General Changes
                - link "Direct link to General Changes" [ref=e1498] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#general-changes-2
                  - text: "#"
              - paragraph [ref=e1499]:
                - strong [ref=e1500]: "Notice:"
                - text: The changes in this section will be gradually rolled out, and will take a week to complete.
              - list [ref=e1501]:
                - listitem [ref=e1502]: FIX Market Data connection limits were increased from 5 to 100 on January 16, 2025. This was not previously highlighted in changelog.
                - listitem [ref=e1503]:
                  - text: New Error code
                  - code [ref=e1504]: "-2038"
                  - text: for order amend keep priority requests that fail.
                - listitem [ref=e1505]:
                  - text: New messages for error code
                  - code [ref=e1506]: "-1034"
                  - text: .
                - listitem [ref=e1507]:
                  - text: If the unfilled order count for
                  - code [ref=e1508]: intervalNum:DAY
                  - text: is exceeded, the unfilled order count for
                  - code [ref=e1509]: intervalNum:SECOND
                  - text: is no longer incremented.
                - listitem [ref=e1510]:
                  - text: Previously, the request weight for myTrades was 20 regardless of the parameters provided. Now, if you provide
                  - code [ref=e1511]: orderId
                  - text: ", the request weight is 5."
                  - list [ref=e1512]:
                    - listitem [ref=e1513]:
                      - text: "REST API:"
                      - code [ref=e1514]: GET /api/v3/myTrades
                    - listitem [ref=e1515]:
                      - text: "WebSocket API:"
                      - code [ref=e1516]: myTrades
                - listitem [ref=e1517]:
                  - text: "Change when querying and deleting orders:"
                  - list [ref=e1518]:
                    - listitem [ref=e1519]:
                      - text: When neither
                      - code [ref=e1520]: orderId
                      - text: nor
                      - code [ref=e1521]: origClientOrderId
                      - text: are present, the request is now rejected with
                      - code [ref=e1522]: "-1102"
                      - text: instead of
                      - code [ref=e1523]: "-1128"
                      - text: .
                    - listitem [ref=e1524]:
                      - text: "Affected requests:"
                      - list [ref=e1525]:
                        - listitem [ref=e1526]:
                          - text: "REST API:"
                          - list [ref=e1527]:
                            - listitem [ref=e1528]:
                              - code [ref=e1529]: GET /api/v3/order
                            - listitem [ref=e1530]:
                              - code [ref=e1531]: DELETE /api/v3/order
                        - listitem [ref=e1532]:
                          - text: WebSocket API
                          - list [ref=e1533]:
                            - listitem [ref=e1534]:
                              - code [ref=e1535]: order.status
                            - listitem [ref=e1536]:
                              - code [ref=e1537]: order.cancel
                        - listitem [ref=e1538]:
                          - text: FIX API
                          - list [ref=e1539]:
                            - listitem [ref=e1540]:
                              - text: OrderCancelRequest
                              - code [ref=e1541]: <F>
              - heading "FIX APIDirect link to FIX API" [level=4] [ref=e1542]:
                - text: FIX API
                - link "Direct link to FIX API" [ref=e1543] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#fix-api-4
                  - text: "#"
              - paragraph [ref=e1544]:
                - strong [ref=e1545]: "Notice:"
                - text: The following changes will occur during April 21, 2025.
              - list [ref=e1546]:
                - listitem [ref=e1547]:
                  - text: FIX API verifies that
                  - code [ref=e1548]: EncryptMethod(98)
                  - text: is 0 at Logon
                  - code [ref=e1549]: <A>
                  - text: .
                - listitem [ref=e1550]: FIX Order Entry connection limits will be a maximum of 10 concurrent connections per account.
                - listitem [ref=e1551]:
                  - text: The connection rate limits are now enforced. Note that these limits are checked independently for both the account and the IP address.
                  - list [ref=e1552]:
                    - listitem [ref=e1553]: "FIX Order Entry: 15 connection attempts within 30 seconds"
                    - listitem [ref=e1554]: "FIX Drop Copy: 15 connection attempts within 30 seconds"
                    - listitem [ref=e1555]: "FIX Market Data: 300 connection attempts within 300 seconds"
                - listitem [ref=e1556]:
                  - text: News
                  - code [ref=e1557]: <B>
                  - text: contains a countdown until disconnection in the Headline field.
                  - list [ref=e1558]:
                    - listitem [ref=e1559]:
                      - text: Following the completion of this update, when the server enters maintenance, a
                      - code [ref=e1560]: News
                      - text: message will be sent to clients
                      - strong [ref=e1561]: every 10 seconds for 10 minutes
                      - text: . After this period, clients will be logged out and their sessions will be closed.
                - listitem [ref=e1562]:
                  - text: OrderCancelRequest
                  - code [ref=e1563]: <F>
                  - text: and OrderCancelRequestAndNewOrderSingle
                  - code [ref=e1564]: <XCN>
                  - text: now allow both
                  - code [ref=e1565]: orderId
                  - text: and
                  - code [ref=e1566]: clientOrderId
                  - text: .
                - listitem [ref=e1567]:
                  - text: The
                  - link "QuickFix schema for FIX OE" [ref=e1568] [cursor=pointer]:
                    - /url: https://github.com/binance/binance-spot-api-docs/blob/master/fix/schemas/spot-fix-oe.xml
                  - text: is updated to support the Order Amend Keep Priority feature and new STP mode,
                  - code [ref=e1569]: DECREMENT
                  - text: .
              - heading "User Data StreamsDirect link to User Data Streams" [level=4] [ref=e1570]:
                - text: User Data Streams
                - link "Direct link to User Data Streams" [ref=e1571] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#user-data-streams
                  - text: "#"
              - list [ref=e1572]:
                - listitem [ref=e1573]:
                  - strong [ref=e1574]:
                    - text: Receiving user data streams on wss://stream.binance.com:9443 using a
                    - code [ref=e1575]: listenKey
                    - text: is now deprecated.
                  - list [ref=e1576]:
                    - listitem [ref=e1577]: This feature will be removed from our systems at a later date.
                - listitem [ref=e1578]:
                  - strong [ref=e1579]:
                    - text: Instead, you should get user data updates by subscribing to the
                    - link "User Data Stream on the WebSocket API" [ref=e1580] [cursor=pointer]:
                      - /url: https://developers.binance.com/docs/binance-spot-api-docs/websocket-api/user-data-stream-requests
                  - text: .
                  - list [ref=e1581]:
                    - listitem [ref=e1582]:
                      - text: This should offer slightly better performance
                      - strong [ref=e1583]: (lower latency)
                      - text: .
                    - listitem [ref=e1584]: This requires the use of an Ed25519 API Key.
                - listitem [ref=e1585]: In a future update, information about the base WebSocket endpoint for the User Data Streams will be removed.
                - listitem [ref=e1586]:
                  - text: "In a future update, the following requests will be removed from the documentation:"
                  - list [ref=e1587]:
                    - listitem [ref=e1588]:
                      - code [ref=e1589]: POST /api/v3/userDataStream
                    - listitem [ref=e1590]:
                      - code [ref=e1591]: PUT /api/v3/userDataStream
                    - listitem [ref=e1592]:
                      - code [ref=e1593]: DELETE /api/v3/userDataStream
                    - listitem [ref=e1594]:
                      - code [ref=e1595]: userDataStream.start
                    - listitem [ref=e1596]:
                      - code [ref=e1597]: userDataStream.ping
                    - listitem [ref=e1598]:
                      - code [ref=e1599]: userDataStream.stop
                - listitem [ref=e1600]:
                  - text: The
                  - link "User Data Stream documentation" [ref=e1601] [cursor=pointer]:
                    - /url: /docs/binance-spot-api-docs/user-data-stream
                  - text: will remain as reference for the payloads you can receive.
              - heading "Future ChangesDirect link to Future Changes" [level=4] [ref=e1602]:
                - text: Future Changes
                - link "Direct link to Future Changes" [ref=e1603] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#future-changes-2
                  - text: "#"
              - paragraph [ref=e1604]:
                - text: The following changes will occur at
                - strong [ref=e1605]: April 24, 2025, 07:00 UTC
                - text: ":"
              - list [ref=e1606]:
                - listitem [ref=e1607]:
                  - deletion [ref=e1608]:
                    - link "Order Amend Keep Priority" [ref=e1609] [cursor=pointer]:
                      - /url: https://github.com/binance/binance-spot-api-docs/blob/master/faqs/order_amend_keep_priority.md
                    - text: becomes available. (Note that the symbol has to have the feature enabled to be used.)
                  - list [ref=e1610]:
                    - listitem [ref=e1611]:
                      - strong [ref=e1612]: "UPDATE 2025-04-21: The exact date \"Order Amend Keep Priority\" will be enabled has not yet been determined."
                    - listitem [ref=e1613]:
                      - text: New field
                      - code [ref=e1614]: amendAllowed
                      - text: becomes visible in Exchange Information responses.
                      - list [ref=e1615]:
                        - listitem [ref=e1616]:
                          - text: "REST API:"
                          - code [ref=e1617]: GET /api/v3/exchangeInfo
                        - listitem [ref=e1618]:
                          - text: "WebSocket API:"
                          - code [ref=e1619]: exchangeInfo
                    - listitem [ref=e1620]:
                      - text: "FIX API: New Order Entry Messages"
                      - strong [ref=e1621]: OrderAmendKeepPriorityRequest
                      - text: and
                      - strong [ref=e1622]: OrderAmendReject
                    - listitem [ref=e1623]:
                      - text: "REST API:"
                      - code [ref=e1624]: PUT /api/v3/order/amend/keepPriority
                    - listitem [ref=e1625]:
                      - text: "WebSocket API:"
                      - code [ref=e1626]: order.amend.keepPriority
                - listitem [ref=e1627]:
                  - deletion [ref=e1628]:
                    - text: STP mode
                    - code [ref=e1629]: DECREMENT
                    - text: becomes visible in Exchange Information if the symbol has it configured.
                  - list [ref=e1630]:
                    - listitem [ref=e1631]:
                      - strong [ref=e1632]:
                        - text: "UPDATE 2025-04-21: The exact date"
                        - code [ref=e1633]: DECREMENT
                        - text: STP will be enabled has not yet been determined.
                    - listitem [ref=e1634]:
                      - text: Instead of expiring only the maker, only the taker, or unconditionally both orders, STP decrement decreases the available quantity of
                      - strong [ref=e1635]: both
                      - text: orders and increases the
                      - code [ref=e1636]: prevented quantity
                      - text: of
                      - strong [ref=e1637]: both
                      - text: orders by the amount of the prevented match.
                    - listitem [ref=e1638]:
                      - text: This expires the order with less available quantity as (
                      - code [ref=e1639]: filled quantity
                      - text: +
                      - code [ref=e1640]: prevented quantity
                      - text: ) equals
                      - code [ref=e1641]: order quantity
                      - text: . Both orders expire if their available quantities are equal. It is called a "decrement" because it reduces available quantity.
                - listitem [ref=e1642]:
                  - text: Behavior when querying and/or canceling with
                  - code [ref=e1643]: orderId
                  - text: and
                  - code [ref=e1644]: origClientOrderId/cancelOrigClientOrderId
                  - text: ":"
                  - list [ref=e1645]:
                    - listitem [ref=e1646]: The behavior when both parameters were provided was not consistent across all endpoints.
                    - listitem [ref=e1647]:
                      - text: Moving forward, when both parameters are provided, the order is first searched for using its
                      - code [ref=e1648]: orderId
                      - text: ", and if found,"
                      - code [ref=e1649]: origClientOrderId
                      - text: /
                      - code [ref=e1650]: cancelOrigClientOrderId
                      - text: is checked against that order. If both conditions pass, the request succeeds. If both conditions are not met the request is rejected.
                    - listitem [ref=e1651]:
                      - text: "Affected requests:"
                      - list [ref=e1652]:
                        - listitem [ref=e1653]:
                          - text: "REST API:"
                          - list [ref=e1654]:
                            - listitem [ref=e1655]:
                              - code [ref=e1656]: GET /api/v3/order
                            - listitem [ref=e1657]:
                              - code [ref=e1658]: DELETE /api/v3/order
                            - listitem [ref=e1659]:
                              - code [ref=e1660]: POST /api/v3/order/cancelReplace
                        - listitem [ref=e1661]:
                          - text: "WebSocket API:"
                          - list [ref=e1662]:
                            - listitem [ref=e1663]:
                              - code [ref=e1664]: order.status
                            - listitem [ref=e1665]:
                              - code [ref=e1666]: order.cancel
                            - listitem [ref=e1667]:
                              - code [ref=e1668]: order.cancelReplace
                        - listitem [ref=e1669]:
                          - text: FIX API
                          - list [ref=e1670]:
                            - listitem [ref=e1671]:
                              - text: OrderCancelRequest
                              - code [ref=e1672]: <F>
                            - listitem [ref=e1673]:
                              - text: OrderCancelRequestAndNewOrderSingle
                              - code [ref=e1674]: <XCN>
                - listitem [ref=e1675]:
                  - text: Behavior when canceling with
                  - code [ref=e1676]: listOrderId
                  - text: and
                  - code [ref=e1677]: listClientOrderId
                  - text: ":"
                  - list [ref=e1678]:
                    - listitem [ref=e1679]: The behavior when both parameters were provided was not consistent across all endpoints.
                    - listitem [ref=e1680]:
                      - text: Moving forward, when both parameters are passed, the order list is first searched for using its
                      - code [ref=e1681]: listOrderId
                      - text: ", and if found,"
                      - code [ref=e1682]: listClientOrderId
                      - text: is checked against that order list. If both conditions are not met the request is rejected.
                    - listitem [ref=e1683]:
                      - text: "Affected requests:"
                      - list [ref=e1684]:
                        - listitem [ref=e1685]:
                          - text: REST API
                          - list [ref=e1686]:
                            - listitem [ref=e1687]:
                              - code [ref=e1688]: DELETE /api/v3/orderList
                        - listitem [ref=e1689]:
                          - text: WebSocket API
                          - list [ref=e1690]:
                            - listitem [ref=e1691]:
                              - code [ref=e1692]: orderList.cancel
                - listitem [ref=e1693]:
                  - strong [ref=e1694]:
                    - text: "SBE: A new schema 3:0 ("
                    - link "spot_3_0.xml" [ref=e1695] [cursor=pointer]:
                      - /url: https://github.com/binance/binance-spot-api-docs/blob/master/sbe/schemas/spot_3_0.xml
                    - text: ) is now available.
                  - list [ref=e1696]:
                    - listitem [ref=e1697]:
                      - text: The current schema 2:1 (
                      - link "spot_2_1.xml" [ref=e1698] [cursor=pointer]:
                        - /url: https://github.com/binance/binance-spot-api-docs/blob/master/sbe/schemas/spot_2_1.xml
                      - text: ) is now deprecated and will be retired in 6 months as per our schema deprecation policy.
                    - listitem [ref=e1699]: Note that trying to use schema 3:0 before it is released will result in an error.
                    - listitem [ref=e1700]:
                      - text: "Changes in schema 3:0:"
                      - list [ref=e1701]:
                        - listitem [ref=e1702]:
                          - text: "Support for Order Amend Keep Priority:"
                          - list [ref=e1703]:
                            - listitem [ref=e1704]:
                              - text: Added field
                              - code [ref=e1705]: amendAllowed
                              - text: to ExchangeInfoResponse.
                            - listitem [ref=e1706]:
                              - text: New Messages
                              - code [ref=e1707]: OrderAmendmentsResponse
                              - text: and
                              - code [ref=e1708]: OrderAmendKeepPriorityResponse
                        - listitem [ref=e1709]:
                          - text: All enums now have a
                          - code [ref=e1710]: NON_REPRESENTABLE
                          - text: variant. This will be used to encode new enum values in the future, which would be incompatible with 3:0.
                        - listitem [ref=e1711]:
                          - text: New enum variant
                          - code [ref=e1712]: DECREMENT
                          - text: for
                          - code [ref=e1713]: selfTradePreventionMode
                          - text: and
                          - code [ref=e1714]: allowedSelfTradePreventionModes
                        - listitem [ref=e1715]:
                          - code [ref=e1716]: symbolStatus
                          - text: enum values
                          - code [ref=e1717]: AUCTION_MATCH
                          - text: ","
                          - code [ref=e1718]: PRE_TRADING
                          - text: and
                          - code [ref=e1719]: POST_TRADING
                          - text: have been removed.
                        - listitem [ref=e1720]:
                          - text: Fields
                          - code [ref=e1721]: usedSor
                          - text: ","
                          - code [ref=e1722]: orderCapacity
                          - text: ","
                          - code [ref=e1723]: workingFloor
                          - text: ","
                          - code [ref=e1724]: preventedQuantity
                          - text: ", and"
                          - code [ref=e1725]: matchType
                          - text: are no longer optional.
                        - listitem [ref=e1726]:
                          - text: Field
                          - code [ref=e1727]: orderCreationTime
                          - text: in
                          - code [ref=e1728]: ExecutionReportEvent
                          - text: is now optional.
                    - listitem [ref=e1729]:
                      - text: "When using deprecated schema 2:1 on the WebSocket API to listen to the User Data Stream:"
                      - list [ref=e1730]:
                        - listitem [ref=e1731]:
                          - code [ref=e1732]: ListStatusEvent
                          - text: field
                          - code [ref=e1733]: listStatusType
                          - text: will be rendered as
                          - code [ref=e1734]: ExecStarted
                          - text: when it should have been
                          - code [ref=e1735]: Updated
                          - text: . Upgrade to schema 3:0 to get the correct value.
                        - listitem [ref=e1736]:
                          - code [ref=e1737]: ExecutionReportEvent
                          - text: field
                          - code [ref=e1738]: selfTradePreventionMode
                          - text: will be rendered as
                          - code [ref=e1739]: None
                          - text: when it should have been
                          - code [ref=e1740]: Decrement
                          - text: . This only happens when
                          - code [ref=e1741]: executionType
                          - text: is
                          - code [ref=e1742]: TradePrevention
                          - text: .
                        - listitem [ref=e1743]:
                          - code [ref=e1744]: ExecutionReportEvent
                          - text: field
                          - code [ref=e1745]: orderCreationTime
                          - text: will be rendered as -1 when it has no value.
                    - listitem [ref=e1746]:
                      - text: All schemas below 3:0 are unable to represent responses for Order Amend Keep Priority requests and any response that could contain the STP mode
                      - code [ref=e1747]: DECREMENT
                      - text: (e.g. Exchange Information, order placement, order cancelation, or querying the status of your order). When a response cannot be represented in the requested schema, an error is returned.
              - separator [ref=e1748]
              - heading "2025-04-03Direct link to 2025-04-03" [level=3] [ref=e1749]:
                - text: 2025-04-03
                - link "Direct link to 2025-04-03" [ref=e1750] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2025-04-03
                  - text: "#"
              - list [ref=e1751]:
                - listitem [ref=e1752]:
                  - text: Following SPOT Testnet's latest announcement, updating the URL in the WebSocket API to the latest URL for
                  - link "SPOT Testnet" [ref=e1753] [cursor=pointer]:
                    - /url: https://testnet.binance.vision/
                  - text: .
              - separator [ref=e1754]
              - heading "2025-03-31Direct link to 2025-03-31" [level=3] [ref=e1755]:
                - text: 2025-03-31
                - link "Direct link to 2025-03-31" [ref=e1756] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2025-03-31
                  - text: "#"
              - list [ref=e1757]:
                - listitem [ref=e1758]: Added a clarification on the performance of canceling an order.
              - separator [ref=e1759]
              - heading "2025-03-10Direct link to 2025-03-10" [level=3] [ref=e1760]:
                - text: 2025-03-10
                - link "Direct link to 2025-03-10" [ref=e1761] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2025-03-10
                  - text: "#"
              - list [ref=e1762]:
                - listitem [ref=e1763]:
                  - strong [ref=e1764]: "Notice: The following changes will happen on 2025-03-13 09:00 UTC"
                  - list [ref=e1765]:
                    - listitem [ref=e1766]:
                      - text: FIX Drop Copy sessions will have a limit of
                      - strong [ref=e1767]: 60 messages per minute
                      - text: .
                    - listitem [ref=e1768]:
                      - text: FIX Market Data sessions will have a limit of
                      - strong [ref=e1769]: 2000 messages per minute
                      - text: .
                    - listitem [ref=e1770]: The FIX API documentation has been updated to reflect the upcoming changes.
                - listitem [ref=e1771]:
                  - strong [ref=e1772]: SBE Market Data Streams will be available on March 18 2025, 07:00 UTC.
                  - text: These streams offer a smaller payload and should offer better latency than the equivalent JSON streams for a subset of latency-sensitive market data streams.
                  - list [ref=e1773]:
                    - listitem [ref=e1774]:
                      - text: "Streams available in SBE format:"
                      - list [ref=e1775]:
                        - listitem [ref=e1776]: "Real-time: trade stream"
                        - listitem [ref=e1777]: "Real-time: best bid/ask"
                        - listitem [ref=e1778]: "Every 100 ms: diff. depth"
                        - listitem [ref=e1779]: "Every 100 ms: partial book depth"
                    - listitem [ref=e1780]:
                      - text: For more information please refer to the
                      - link "SBE Market Data Streams" [ref=e1781] [cursor=pointer]:
                        - /url: /docs/binance-spot-api-docs/sbe-market-data-streams
                      - text: .
              - separator [ref=e1782]
              - heading "2025-03-05Direct link to 2025-03-05" [level=3] [ref=e1783]:
                - text: 2025-03-05
                - link "Direct link to 2025-03-05" [ref=e1784] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2025-03-05
                  - text: "#"
              - list [ref=e1785]:
                - listitem [ref=e1786]:
                  - strong [ref=e1787]: "Notice: The following changes will happen on March 10, 2025 12:00 UTC."
                  - text: "The following request weights will be increased from 2 to 4:"
                  - list [ref=e1788]:
                    - listitem [ref=e1789]:
                      - text: "REST API:"
                      - code [ref=e1790]: GET /api/v3/aggTrade
                    - listitem [ref=e1791]:
                      - text: "WebSocket API:"
                      - code [ref=e1792]: trades.aggregate
                - listitem [ref=e1793]: The documentation for both REST and WebSocket API has been updated to reflect the upcoming changes.
              - separator [ref=e1794]
              - heading "2025-02-12Direct link to 2025-02-12" [level=3] [ref=e1795]:
                - text: 2025-02-12
                - link "Direct link to 2025-02-12" [ref=e1796] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2025-02-12
                  - text: "#"
              - list [ref=e1797]:
                - listitem [ref=e1798]:
                  - strong [ref=e1799]: "Notice: These changes will take effect on February 26, 2025 05:00 UTC."
                  - text: Please ensure you have downloaded the latest schema before then.
                - listitem [ref=e1800]:
                  - code [ref=e1801]: AggressorSide (2446)
                  - text: will be rendered in the
                  - link "FIX Market Data Trade Stream" [ref=e1802] [cursor=pointer]:
                    - /url: /docs/binance-spot-api-docs/fix-api#tradestream
                  - text: . The QuickFix schema
                  - link "file" [ref=e1803] [cursor=pointer]:
                    - /url: https://github.com/binance/binance-spot-api-docs/blob/master/fix/schemas/spot-fix-md.xml
                  - text: has also been updated.
              - separator [ref=e1804]
              - heading "2025-01-28Direct link to 2025-01-28" [level=3] [ref=e1805]:
                - text: 2025-01-28
                - link "Direct link to 2025-01-28" [ref=e1806] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2025-01-28
                  - text: "#"
              - list [ref=e1807]:
                - listitem [ref=e1808]:
                  - strong [ref=e1809]: "Notice: These changes will be gradually rolled out between February 3, 2025 and February 14, 2025."
                  - strong [ref=e1810]: "The following changes will apply to WebSocket Market Data Streams, User Data Streams, and the WebSocket API:"
                  - list [ref=e1811]:
                    - listitem [ref=e1812]:
                      - text: Our WebSocket services will send a ping frame
                      - strong [ref=e1813]: every 20 seconds
                      - text: instead of 3 minutes.
                    - listitem [ref=e1814]:
                      - text: The allowed pong delay will be
                      - strong [ref=e1815]: every 1 minute
                      - text: instead of 10 minutes.
                    - listitem [ref=e1816]: The documentation for these services have been updated to reflect the change.
              - separator [ref=e1817]
              - heading "2025-01-09Direct link to 2025-01-09" [level=3] [ref=e1818]:
                - text: 2025-01-09
                - link "Direct link to 2025-01-09" [ref=e1819] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2025-01-09
                  - text: "#"
              - list [ref=e1820]:
                - listitem [ref=e1821]:
                  - text: FIX Market Data will be available at
                  - strong [ref=e1822]: January 16, 05:00 UTC
                  - text: . The FIX API documentation has been updated regarding this feature.
                - listitem [ref=e1823]:
                  - text: Please refer to this
                  - link "link" [ref=e1824] [cursor=pointer]:
                    - /url: https://github.com/binance/binance-spot-api-docs/blob/master/fix/schemas/spot-fix-md.xml
                  - text: for the QuickFIX Schema for FIX Market Data.
              - separator [ref=e1825]
              - heading "2024-12-17Direct link to 2024-12-17" [level=3] [ref=e1826]:
                - text: 2024-12-17
                - link "Direct link to 2024-12-17" [ref=e1827] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2024-12-17
                  - text: "#"
              - paragraph [ref=e1828]: "General Changes:"
              - paragraph [ref=e1829]:
                - text: The system now supports microseconds in all related time and/or timestamp fields. Microsecond support is
                - strong [ref=e1830]: opt-in
                - text: ", by default the requests and responses still use milliseconds. Examples in documentation are also using milliseconds for the foreseeable future."
              - paragraph [ref=e1831]: WebSocket Streams
              - list [ref=e1832]:
                - listitem [ref=e1833]:
                  - text: A new optional parameter
                  - code [ref=e1834]: timeUnit
                  - text: can be used in the connection URL to select the time unit.
                  - list [ref=e1835]:
                    - listitem [ref=e1836]:
                      - text: "For example:"
                      - code [ref=e1837]: /stream?streams=btcusdt@trade&timeUnit=millisecond
                    - listitem [ref=e1838]:
                      - text: "Supported values are:"
                      - list [ref=e1839]:
                        - listitem [ref=e1840]:
                          - code [ref=e1841]: MILLISECOND
                        - listitem [ref=e1842]:
                          - code [ref=e1843]: millisecond
                        - listitem [ref=e1844]:
                          - code [ref=e1845]: MICROSECOND
                        - listitem [ref=e1846]:
                          - code [ref=e1847]: microsecond
                    - listitem [ref=e1848]: If the time unit is not selected, milliseconds will be used by default.
              - paragraph [ref=e1849]: REST API
              - list [ref=e1850]:
                - listitem [ref=e1851]:
                  - text: A new optional header
                  - code [ref=e1852]: X-MBX-TIME-UNIT
                  - text: can be sent in the request to select the time unit.
                  - list [ref=e1853]:
                    - listitem [ref=e1854]:
                      - text: "Supported values:"
                      - list [ref=e1855]:
                        - listitem [ref=e1856]:
                          - code [ref=e1857]: MILLISECOND
                        - listitem [ref=e1858]:
                          - code [ref=e1859]: millisecond
                        - listitem [ref=e1860]:
                          - code [ref=e1861]: MICROSECOND
                        - listitem [ref=e1862]:
                          - code [ref=e1863]: microsecond
                    - listitem [ref=e1864]:
                      - text: The time unit affects timestamp fields in JSON responses (e.g.,
                      - code [ref=e1865]: time
                      - text: ","
                      - code [ref=e1866]: transactTime
                      - text: ).
                      - list [ref=e1867]:
                        - listitem [ref=e1868]: SBE responses continue to be in microseconds regardless of time unit.
                    - listitem [ref=e1869]: If the time unit is not selected, milliseconds will be used by default.
                - listitem [ref=e1870]:
                  - text: Timestamp parameters (e.g.
                  - code [ref=e1871]: startTime
                  - text: ","
                  - code [ref=e1872]: endTime
                  - text: ","
                  - code [ref=e1873]: timestamp)
                  - text: can now be passed in milliseconds or microseconds.
              - paragraph [ref=e1874]: WebSocket API
              - list [ref=e1875]:
                - listitem [ref=e1876]:
                  - text: A new optional parameter
                  - code [ref=e1877]: timeUnit
                  - text: can be used in the connection URL to select the time unit.
                  - list [ref=e1878]:
                    - listitem [ref=e1879]:
                      - text: "Supported values:"
                      - list [ref=e1880]:
                        - listitem [ref=e1881]:
                          - code [ref=e1882]: MILLISECOND
                        - listitem [ref=e1883]:
                          - code [ref=e1884]: millisecond
                        - listitem [ref=e1885]:
                          - code [ref=e1886]: MICROSECOND
                        - listitem [ref=e1887]:
                          - code [ref=e1888]: microsecond
                    - listitem [ref=e1889]:
                      - text: The time unit affects timestamp fields in JSON responses (e.g.,
                      - code [ref=e1890]: time
                      - text: ","
                      - code [ref=e1891]: transactTime
                      - text: ).
                      - list [ref=e1892]:
                        - listitem [ref=e1893]: SBE responses continue to be in microseconds regardless of time unit.
                    - listitem [ref=e1894]: If the time unit is not selected, milliseconds will be used by default.
                - listitem [ref=e1895]:
                  - text: Timestamp parameters (e.g.
                  - code [ref=e1896]: startTime
                  - text: ","
                  - code [ref=e1897]: endTime
                  - text: ","
                  - code [ref=e1898]: timestamp)
                  - text: can now be passed in milliseconds or microseconds.
              - paragraph [ref=e1899]: User Data Streams
              - list [ref=e1900]:
                - listitem [ref=e1901]:
                  - text: A new optional parameter
                  - code [ref=e1902]: timeUnit
                  - text: can be used in the connection URL to select the time unit.
                  - list [ref=e1903]:
                    - listitem [ref=e1904]:
                      - text: Supported values
                      - list [ref=e1905]:
                        - listitem [ref=e1906]:
                          - code [ref=e1907]: MILLISECOND
                        - listitem [ref=e1908]:
                          - code [ref=e1909]: MICROSECOND
                          - text: .
                        - listitem [ref=e1910]:
                          - code [ref=e1911]: microsecond
                        - listitem [ref=e1912]:
                          - code [ref=e1913]: millisecond
