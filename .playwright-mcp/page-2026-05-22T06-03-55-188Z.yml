              - paragraph [ref=e3333]:
                - strong [ref=e3334]: New Feature
                - text: ": Self-Trade Prevention (aka STP) will be added to the system at a later date. This will prevent orders from matching with orders from the same account, or accounts under the same"
                - code [ref=e3335]: tradeGroupId
                - text: .
              - paragraph [ref=e3336]:
                - text: Please refer to
                - code [ref=e3337]: GET /api/v3/exchangeInfo
                - text: from the Rest API or
                - code [ref=e3338]: exchangeInfo
                - text: from the Websocket API on the status.
