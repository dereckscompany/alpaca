                - text: document.
              - paragraph [ref=e3361]: REST API
              - list [ref=e3362]:
                - listitem [ref=e3363]:
                  - text: "New order status:"
                  - code [ref=e3364]: EXPIRED_IN_MATCH
                  - text: "- This means that the order expired due to STP being triggered."
                - listitem [ref=e3365]:
                  - text: "New endpoint:"
                  - list [ref=e3366]:
                    - listitem [ref=e3367]:
                      - code [ref=e3368]: GET /api/v3/myPreventedMatches
                      - text: "- This queries the orders that expired due to STP being triggered."
                - listitem [ref=e3369]:
                  - text: New optional parameter
                  - code [ref=e3370]: selfTradePreventionMode
                  - text: "has been added to the following endpoints:"
                  - list [ref=e3371]:
                    - listitem [ref=e3372]:
                      - code [ref=e3373]: POST /api/v3/order
                    - listitem [ref=e3374]:
                      - code [ref=e3375]: POST /api/v3/order/oco
                    - listitem [ref=e3376]:
                      - code [ref=e3377]: POST /api/v3/cancelReplace
                - listitem [ref=e3378]:
                  - text: New responses that will appear for all order placement endpoints if there was a prevented match (i.e. if an order could have matched with an order of the same account, or the accounts are in the same
                  - code [ref=e3379]: tradeGroupId
                  - text: "):"
                  - list [ref=e3380]:
                    - listitem [ref=e3381]:
                      - code [ref=e3382]: tradeGroupId
                      - text: "- This will only appear if account is configured to a"
                      - code [ref=e3383]: tradeGroupId
                      - text: and if there was a prevented match.
                    - listitem [ref=e3384]:
                      - code [ref=e3385]: preventedQuantity
                      - text: "- Only appears if there was a prevented match."
                    - listitem [ref=e3386]:
                      - text: An array
                      - code [ref=e3387]: preventedMatches
                      - text: "with the following fields:"
                      - list [ref=e3388]:
                        - listitem [ref=e3389]:
                          - code [ref=e3390]: preventedMatchId
                        - listitem [ref=e3391]:
                          - code [ref=e3392]: makerOrderId
                        - listitem [ref=e3393]:
                          - code [ref=e3394]: price
                        - listitem [ref=e3395]:
                          - code [ref=e3396]: takerPreventedQuantity
                          - text: "- This will only appear if"
                          - code [ref=e3397]: selfTradePreventionMode
                          - text: set is
                          - code [ref=e3398]: EXPIRE_TAKER
                          - text: or
                          - code [ref=e3399]: EXPIRE_BOTH
                          - text: .
                        - listitem [ref=e3400]:
                          - code [ref=e3401]: makerPreventedQuantity
                          - text: "- This will only appear if"
                          - code [ref=e3402]: selfTradePreventionMode
                          - text: set is
                          - code [ref=e3403]: EXPIRE_MAKER
                          - text: or
                          - code [ref=e3404]: EXPIRE_BOTH
                          - text: .
                - listitem [ref=e3405]:
                  - text: New fields
                  - code [ref=e3406]: preventedMatchId
                  - text: and
                  - code [ref=e3407]: preventedQuantity
                  - text: "that can appear in the order query endpoints if the order had expired due to an STP trigger:"
                  - list [ref=e3408]:
                    - listitem [ref=e3409]:
                      - code [ref=e3410]: GET /api/v3/order
                    - listitem [ref=e3411]:
                      - code [ref=e3412]: GET /api/v3/openOrders
                    - listitem [ref=e3413]:
                      - code [ref=e3414]: GET /api/v3/allOrders
              - paragraph [ref=e3415]: WEBSOCKET API
              - list [ref=e3416]:
                - listitem [ref=e3417]:
                  - text: "New order status:"
                  - code [ref=e3418]: EXPIRED_IN_MATCH
                  - text: "- This means that the order expired due to STP being triggered."
                - listitem [ref=e3419]:
                  - text: New optional parameter
                  - code [ref=e3420]: selfTradePreventionMode
                  - text: "has been added to the following requests:"
                  - list [ref=e3421]:
