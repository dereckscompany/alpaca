              - separator [ref=e2426]
              - heading "2023-12-04Direct link to 2023-12-04" [level=3] [ref=e2427]:
                - text: 2023-12-04
                - link "Direct link to 2023-12-04" [ref=e2428] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2023-12-04
                  - text: "#"
              - paragraph [ref=e2429]:
                - strong [ref=e2430]: "Notice:"
                - text: The changes below are being rolled out gradually, and will take approximately a week to complete.
              - paragraph [ref=e2431]: "General Changes:"
              - list [ref=e2432]:
                - listitem [ref=e2433]:
                  - text: Error message
                  - code [ref=e2434]: Precision is over the maximum defined for this asset.
                  - text: has been changed to
                  - code [ref=e2435]: Parameter '%s' has too much precision.
                  - list [ref=e2436]:
                    - listitem [ref=e2437]:
                      - text: "This error message is returned when a parameter has more precision than allowed: e.g. if"
                      - code [ref=e2438]: base asset
                      - text: precision is 6 and
                      - code [ref=e2439]: quantity=0.1234567
                      - text: then this error message will appear.
                    - listitem [ref=e2440]:
                      - text: "This affects all requests with the following parameters:"
                      - list [ref=e2441]:
                        - listitem [ref=e2442]:
                          - code [ref=e2443]: quantity
                        - listitem [ref=e2444]:
                          - code [ref=e2445]: quoteOrderQty
                        - listitem [ref=e2446]:
                          - code [ref=e2447]: icebergQty
                        - listitem [ref=e2448]:
                          - code [ref=e2449]: limitIcebergQty
                        - listitem [ref=e2450]:
                          - code [ref=e2451]: stopIcebergQty
                        - listitem [ref=e2452]:
                          - code [ref=e2453]: price
                        - listitem [ref=e2454]:
                          - code [ref=e2455]: stopPrice
                        - listitem [ref=e2456]:
                          - code [ref=e2457]: stopLimitPrice
                - listitem [ref=e2458]:
                  - text: Requests for open OCO now correctly return results in
                  - strong [ref=e2459]: ascending order
                  - text: ". This affects the following requests:"
                  - list [ref=e2460]:
                    - listitem [ref=e2461]:
                      - text: "REST API:"
                      - code [ref=e2462]: GET /api/v3/openOrderList
                    - listitem [ref=e2463]:
                      - text: "WebSocket API:"
                      - code [ref=e2464]: openOrderList.status
                - listitem [ref=e2465]:
                  - text: Requests for all OCO now correctly return results in
                  - strong [ref=e2466]: ascending order
                  - text: when
                  - code [ref=e2467]: startTime
                  - text: or
                  - code [ref=e2468]: fromId
                  - text: "are specified. This affects the following requests:"
                  - list [ref=e2469]:
                    - listitem [ref=e2470]:
                      - text: "REST API:"
                      - code [ref=e2471]: GET /api/v3/allOrderList
                    - listitem [ref=e2472]:
                      - text: "WebSocket API:"
                      - code [ref=e2473]: allOrderLists
                - listitem [ref=e2474]:
                  - text: Fixed a bug where order query requests would incorrectly return
                  - link "-2026 ORDER_ARCHIVED" [ref=e2475] [cursor=pointer]:
                    - /url: /docs/binance-spot-api-docs/errors#-2026-order_archived
                    - code [ref=e2476]: "-2026 ORDER_ARCHIVED"
                  - text: error for newly placed orders.
                  - list [ref=e2477]:
                    - listitem [ref=e2478]:
                      - text: "REST API:"
                      - code [ref=e2479]: GET /api/v3/order
                    - listitem [ref=e2480]:
                      - text: "WebSocket API:"
                      - code [ref=e2481]: order.status
              - paragraph [ref=e2482]: REST API
              - list [ref=e2483]:
                - listitem [ref=e2484]:
                  - text: New endpoint
                  - code [ref=e2485]: GET /api/v3/account/commission
                - listitem [ref=e2486]:
                  - text: New endpoint
                  - code [ref=e2487]: GET /api/v3/ticker/tradingDay
                - listitem [ref=e2488]:
                  - code [ref=e2489]: GET /api/v3/avgPrice
                  - text: response has a new field
                  - code [ref=e2490]: closeTime
                  - text: ", indicating the last trade time."
                - listitem [ref=e2491]:
                  - code [ref=e2492]: GET /api/v3/klines
                  - text: and
                  - code [ref=e2493]: /api/v3/uiKlines
                  - text: have a new optional parameter
                  - code [ref=e2494]: timeZone
                  - text: .
                - listitem [ref=e2495]:
                  - code [ref=e2496]: POST /api/v3/order/test
                  - text: and
                  - code [ref=e2497]: POST /api/v3/sor/order/test
                  - text: have a new optional parameter
                  - code [ref=e2498]: computeCommissionRates
                  - text: .
                - listitem [ref=e2499]:
                  - text: "Changes regarding invalid endpoints being sent:"
                  - list [ref=e2500]:
                    - listitem [ref=e2501]:
                      - text: Previously, if you query an non-existing endpoint (e.g.
                      - code [ref=e2502]: curl -X GET "https://api.binance.com/api/v3/exchangie
                      - text: ) you would get a HTTP 404 code with the response
                      - code [ref=e2503]: <html><body><h2>404 Not found</h2></body></html>
                    - listitem [ref=e2504]:
                      - text: From now on the HTML response will only appear if the Accept request header has
                      - code [ref=e2505]: text/html
                      - text: for this situation. The HTTP code will remain the same.
              - paragraph [ref=e2506]: WebSocket API
              - list [ref=e2507]:
                - listitem [ref=e2508]:
                  - text: New request
                  - code [ref=e2509]: account.commission
                - listitem [ref=e2510]:
                  - text: "New requests to allow session authentication:"
                  - strong [ref=e2511]: (Note that these requests can only be used with Ed25519 keys.)
                  - list [ref=e2512]:
                    - listitem [ref=e2513]:
                      - code [ref=e2514]: session.logon
                    - listitem [ref=e2515]:
                      - code [ref=e2516]: session.logout
                    - listitem [ref=e2517]:
                      - code [ref=e2518]: session.status
                - listitem [ref=e2519]:
                  - text: New request
                  - code [ref=e2520]: ticker.tradingDay
                - listitem [ref=e2521]:
                  - code [ref=e2522]: avgPrice
                  - text: response has a new field
                  - code [ref=e2523]: closeTime
                  - text: ", indicating the last trade time."
                - listitem [ref=e2524]:
                  - code [ref=e2525]: klines
                  - text: and
                  - code [ref=e2526]: uiKlines
                  - text: have a new optional parameter
                  - code [ref=e2527]: timeZone
                  - text: .
                - listitem [ref=e2528]:
                  - code [ref=e2529]: order.test
                  - text: and
                  - code [ref=e2530]: sor.order.test
                  - text: have a new optional parameter
                  - code [ref=e2531]: computeCommissionRates
                  - text: .
                - listitem [ref=e2532]: Fixed a bug where unsolicited pongs sent before the ping would cause disconnection.
              - paragraph [ref=e2533]: WebSocket Streams
              - list [ref=e2534]:
                - listitem [ref=e2535]:
                  - text: New stream
                  - code [ref=e2536]: <symbol>@avgPrice
                - listitem [ref=e2537]:
                  - code [ref=e2538]: id
                  - text: now supports the same values as used for
                  - code [ref=e2539]: id
                  - text: "in the WebSocket API:"
                  - list [ref=e2540]:
                    - listitem [ref=e2541]: 64-bit signed integers (previously this was unsigned)
                    - listitem [ref=e2542]: Alphanumeric strings, max of 36 in length
                    - listitem [ref=e2543]:
                      - code [ref=e2544]: "null"
                - listitem [ref=e2545]: Fixed a bug where unsolicited pongs sent before the ping would cause disconnection.
              - paragraph [ref=e2546]: User Data Streams
              - list [ref=e2547]:
                - listitem [ref=e2548]:
                  - text: When an event of type
                  - code [ref=e2549]: executionReport
                  - text: has an execution type (
                  - code [ref=e2550]: x
                  - text: ) of
                  - code [ref=e2551]: TRADE_PREVENTION
                  - text: ", fields"
                  - code [ref=e2552]: l
                  - text: ","
                  - code [ref=e2553]: L
                  - text: and
                  - code [ref=e2554]: "Y"
                  - text: will now always be 0. New fields
                  - code [ref=e2555]: pl
                  - text: ","
                  - code [ref=e2556]: pL
                  - text: and
                  - code [ref=e2557]: pY
                  - text: will describe the prevented execution quantity, prevented execution price, and prevented execution notional instead. These new fields show the values of what would
                  - code [ref=e2558]: l
                  - text: ","
                  - code [ref=e2559]: L
                  - text: and
                  - code [ref=e2560]: "Y"
                  - text: have been if the taker order didn't have self-trade prevention enabled.
              - paragraph [ref=e2561]:
                - strong [ref=e2562]:
                  - text: The following will take effect
                  - emphasis [ref=e2563]: approximately
                  - text: "a week after the release date:"
              - list [ref=e2564]:
                - listitem [ref=e2565]:
                  - text: Symbol Permissions will only affect order placement, not cancellation.
                  - list [ref=e2566]:
                    - listitem [ref=e2567]:
                      - code [ref=e2568]: permissions
                      - text: still apply to Cancel-Replace orders (i.e. The cancellation won't be allowed if your account does have the permission to place an order using this request.)
