              - paragraph [ref=e4438]: WEB SOCKET STREAM
              - list [ref=e4439]:
                - listitem [ref=e4440]:
                  - text: "WebSocket connections have a limit of 5 incoming messages per second. A message is considered:"
                  - list [ref=e4441]:
                    - listitem [ref=e4442]: A PING frame
                    - listitem [ref=e4443]: A PONG frame
                    - listitem [ref=e4444]: A JSON control message (e.g. subscribe, unsubscribe)
                - listitem [ref=e4445]: A connection that goes beyond the limit will be disconnected; IPs that are repeatedly disconnected may be banned.
                - listitem [ref=e4446]: A single connection can listen to a maximum of 1024 streams.
              - separator [ref=e4447]
