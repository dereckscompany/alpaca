                        - listitem [ref=e875]:
                          - code [ref=e876]: ticker.tradingDay
                        - listitem [ref=e877]:
                          - code [ref=e878]: ticker
                - listitem [ref=e879]:
                  - text: When the parameter
                  - code [ref=e880]: symbolStatus=<STATUS>
                  - text: is provided, only symbols whose trading status matches the specified
                  - code [ref=e881]: STATUS
                  - text: will be included in the response:_
                  - list [ref=e882]:
                    - listitem [ref=e883]:
                      - text: If a single symbol is specified using the
                      - code [ref=e884]: symbol=<SYMBOL>
                      - text: parameter and its trading status does not match the given
                      - code [ref=e885]: STATUS
                      - text: ", the endpoint will return error code"
                      - link "-1220 SYMBOL_DOES_NOT_MATCH_STATUS" [ref=e886] [cursor=pointer]:
                        - /url: /docs/binance-spot-api-docs/errors#-1220-symbol_does_not_match_status
                        - code [ref=e887]: "-1220 SYMBOL_DOES_NOT_MATCH_STATUS"
                      - text: .
                    - listitem [ref=e888]:
                      - text: If multiple symbols are specified using the
                      - code [ref=e889]: symbols=[...]
                      - text: parameter, the response will be an array that excludes any symbols whose trading status does not match
                      - code [ref=e890]: STATUS
                      - text: . If no symbols from the symbols parameter have a trading status that matches
                      - code [ref=e891]: STATUS
                      - text: ", the response is an empty array."
                    - listitem [ref=e892]:
                      - text: For endpoints where the
                      - code [ref=e893]: symbol
                      - text: and
                      - code [ref=e894]: symbols
                      - text: parameters are optional, omitting these parameters is treated as if all symbols had been specified in the
                      - code [ref=e895]: symbols=[...]
                      - text: parameter. See the previous line for the behavior of
                      - code [ref=e896]: symbolStatus=<STATUS>
                      - text: .
