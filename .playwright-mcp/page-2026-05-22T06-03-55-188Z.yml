                  - text: "#"
              - list [ref=e705]:
                - listitem [ref=e706]:
                  - text: "Unicode values encoded in UTF-8 can now be accepted in FIX messages. This is allowed for the following tags only:"
                  - list [ref=e707]:
                    - listitem [ref=e708]:
                      - code [ref=e709]: Currency (15)
                    - listitem [ref=e710]:
                      - code [ref=e711]: MiscFeeCurr (138)
                    - listitem [ref=e712]:
                      - code [ref=e713]: Symbol (55)
                    - listitem [ref=e714]:
                      - code [ref=e715]: SecondarySymbol (25019)
                    - listitem [ref=e716]:
                      - code [ref=e717]: CounterSymbol (25028)
                    - listitem [ref=e718]:
                      - code [ref=e719]: SecurityDesc (107)
                - listitem [ref=e720]:
                  - text: When Unicode is put in a tag value that is not one of the tags above, FIX API will now send back a
                  - code [ref=e721]: RefTagID (371)
                  - text: tag in the Reject
                  - code [ref=e722]: <3>
                  - text: ", pointing to exactly which tag is not allowed to contain Unicode."
                - listitem [ref=e723]:
                  - text: NewOrderList
                  - code [ref=e724]: <E>
                  - text: accepts
                  - code [ref=e725]: TriggerPriceDirection (1109)
                  - text: without
                  - code [ref=e726]: TriggerPrice (1102)
                  - text: .
