              - list [ref=e2167]:
                - listitem [ref=e2168]:
                  - text: A new optional parameter
                  - code [ref=e2169]: showPermissionSets
                  - text: can be used to hide the permissions from
                  - code [ref=e2170]: permissionsSets
                  - text: ; This can be used for a reduced payload size.
                - listitem [ref=e2171]:
                  - text: A new optional parameter
                  - code [ref=e2172]: symbolStatus
                  - text: can now be used to only show symbols with the specified status. (e.g.
                  - code [ref=e2173]: TRADING
