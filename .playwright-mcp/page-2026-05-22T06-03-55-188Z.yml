                  - code [ref=e4452]: MAX_POSITION
                  - text: filter added.
                  - list [ref=e4453]:
                    - listitem [ref=e4454]:
                      - paragraph [ref=e4455]: "This filter defines the allowed maximum position an account can have on the base asset of a symbol. An account's position defined as the sum of the account's:"
                      - list [ref=e4456]:
                        - listitem [ref=e4457]: free balance of the base asset
                        - listitem [ref=e4458]: locked balance of the base asset
                        - listitem [ref=e4459]: sum of the qty of all open BUY orders
                    - listitem [ref=e4460]:
                      - paragraph [ref=e4461]:
                        - code [ref=e4462]: BUY
                        - text: orders will be rejected if the account's position is greater than the maximum position allowed.
