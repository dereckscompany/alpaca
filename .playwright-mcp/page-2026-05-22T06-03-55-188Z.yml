                          - text: .
                        - listitem [ref=e3452]:
                          - code [ref=e3453]: makerPreventedQuantity
                          - text: "- This will only appear if"
                          - code [ref=e3454]: selfTradePreventionMode
                          - text: set is
                          - code [ref=e3455]: EXPIRE_MAKER
                          - text: or
                          - code [ref=e3456]: EXPIRE_BOTH
                          - text: .
                - listitem [ref=e3457]:
                  - text: New fields
                  - code [ref=e3458]: preventedMatchId
                  - text: and
                  - code [ref=e3459]: preventedQuantity
                  - text: "that can appear in the order query requests if the order had expired due to STP trigger:"
                  - list [ref=e3460]:
                    - listitem [ref=e3461]:
                      - code [ref=e3462]: order.status
                    - listitem [ref=e3463]:
                      - code [ref=e3464]: openOrders.status
                    - listitem [ref=e3465]:
                      - code [ref=e3466]: allOrders
              - paragraph [ref=e3467]: USER DATA STREAM
              - list [ref=e3468]:
                - listitem [ref=e3469]:
                  - text: "New execution Type:"
