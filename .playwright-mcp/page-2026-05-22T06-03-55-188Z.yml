              - list [ref=e4376]:
                - listitem [ref=e4377]:
                  - text: From 2020-05-01 UTC 00:00, all symbols will have a limit of 200 open orders using the
                  - link "MAX_NUM_ORDERS" [ref=e4378] [cursor=pointer]:
                    - /url: /docs/binance-spot-api-docs/filters#max_num_orders
                  - text: filter.
                  - list [ref=e4379]:
                    - listitem [ref=e4380]: No existing orders will be removed or canceled.
                    - listitem [ref=e4381]: Accounts that have 200 or more open orders on a symbol will not be able to place new orders on that symbol until the open order count is below 200.
                    - listitem [ref=e4382]:
                      - text: OCO orders count as 2 open orders before the
                      - code [ref=e4383]: LIMIT
                      - text: order is touched or the
                      - code [ref=e4384]: STOP_LOSS
                      - text: (or
                      - code [ref=e4385]: STOP_LOSS_LIMIT
                      - text: ) order is triggered; once this happens the other order is canceled and will no longer count as an open order.
