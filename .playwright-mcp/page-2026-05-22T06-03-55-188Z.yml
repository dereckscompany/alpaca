              - paragraph [ref=e4632]: REST API
              - list [ref=e4633]:
                - listitem [ref=e4634]:
                  - paragraph [ref=e4635]: "New order type: OCO (\"One Cancels the Other\")"
                  - list [ref=e4636]:
                    - listitem [ref=e4637]:
                      - paragraph [ref=e4638]: "An OCO has 2 orders: (also known as legs in financial terms)"
                      - list [ref=e4639]:
                        - listitem [ref=e4640]:
                          - code [ref=e4641]: STOP_LOSS
                          - text: or
                          - code [ref=e4642]: STOP_LOSS_LIMIT
                          - text: leg
                        - listitem [ref=e4643]:
                          - code [ref=e4644]: LIMIT_MAKER
                          - text: leg
                    - listitem [ref=e4645]:
                      - paragraph [ref=e4646]: "Price Restrictions:"
                      - list [ref=e4647]:
                        - listitem [ref=e4648]:
                          - code [ref=e4649]: SELL Orders
                          - text: ": Limit Price > Last Price > Stop Price"
                        - listitem [ref=e4650]:
                          - code [ref=e4651]: BUY Orders
                          - text: ": Limit Price < Last Price < Stop Price"
                        - listitem [ref=e4652]:
                          - text: "As stated, the prices must \"straddle\" the last traded price on the symbol. EX: If the last price is 10:"
                          - list [ref=e4653]:
                            - listitem [ref=e4654]: A SELL OCO must have the limit price greater than 10, and the stop price less than 10.
                            - listitem [ref=e4655]: A BUY OCO must have a limit price less than 10, and the stop price greater than 10.
                    - listitem [ref=e4656]:
                      - paragraph [ref=e4657]: "Quantity Restrictions:"
                      - list [ref=e4658]:
                        - listitem [ref=e4659]:
                          - text: Both legs must have the
                          - strong [ref=e4660]: same quantity
                          - text: .
                        - listitem [ref=e4661]:
                          - code [ref=e4662]: ICEBERG
                          - text: quantities however, do not have to be the same.
                    - listitem [ref=e4663]:
                      - paragraph [ref=e4664]: "Execution Order:"
                      - list [ref=e4665]:
                        - listitem [ref=e4666]:
                          - text: If the
                          - code [ref=e4667]: LIMIT_MAKER
                          - text: is touched, the limit maker leg will be executed first BEFORE canceling the Stop Loss Leg.
                        - listitem [ref=e4668]:
                          - text: if the Market Price moves such that the
                          - code [ref=e4669]: STOP_LOSS
                          - text: or
                          - code [ref=e4670]: STOP_LOSS_LIMIT
                          - text: will trigger, the Limit Maker leg will be canceled BEFORE executing the
                          - code [ref=e4671]: STOP_LOSS
                          - text: Leg.
                    - listitem [ref=e4672]:
                      - paragraph [ref=e4673]: Canceling an OCO
                      - list [ref=e4674]:
                        - listitem [ref=e4675]: Canceling either order leg will cancel the entire OCO.
                        - listitem [ref=e4676]:
                          - text: The entire OCO can be canceled via the
                          - code [ref=e4677]: orderListId
                          - text: or the
                          - code [ref=e4678]: listClientOrderId
                          - text: .
                    - listitem [ref=e4679]:
                      - paragraph [ref=e4680]: "New Enums for OCO:"
                      - list [ref=e4681]:
                        - listitem [ref=e4682]:
                          - code [ref=e4683]: ListStatusType
                          - list [ref=e4684]:
                            - listitem [ref=e4685]:
                              - code [ref=e4686]: RESPONSE
                              - text: "- used when ListStatus is responding to a failed action. (either order list placement or cancellation)"
                            - listitem [ref=e4687]:
                              - code [ref=e4688]: EXEC_STARTED
                              - text: "- used when an order list has been placed or there is an update to a list's status."
                            - listitem [ref=e4689]:
                              - code [ref=e4690]: ALL_DONE
                              - text: "- used when an order list has finished executing and is no longer active."
                        - listitem [ref=e4691]:
                          - code [ref=e4692]: ListOrderStatus
                          - list [ref=e4693]:
                            - listitem [ref=e4694]:
                              - code [ref=e4695]: EXECUTING
                              - text: "- used when an order list has been placed or there is an update to a list's status."
                            - listitem [ref=e4696]:
                              - code [ref=e4697]: ALL_DONE
                              - text: "- used when an order list has finished executing and is no longer active."
                            - listitem [ref=e4698]:
                              - code [ref=e4699]: REJECT
                              - text: "- used when ListStatus is responding to a failed action. (either order list placement or cancellation)"
                        - listitem [ref=e4700]:
                          - code [ref=e4701]: ContingencyType
                          - list [ref=e4702]:
                            - listitem [ref=e4703]:
                              - code [ref=e4704]: OCO
                              - text: "- specifies the type of order list."
                    - listitem [ref=e4705]:
                      - paragraph [ref=e4706]: "New Endpoints:"
                      - list [ref=e4707]:
                        - listitem [ref=e4708]: POST api/v3/order/oco
                        - listitem [ref=e4709]: DELETE api/v3/orderList
                        - listitem [ref=e4710]: GET api/v3/orderList
                - listitem [ref=e4711]:
                  - paragraph [ref=e4712]:
                    - code [ref=e4713]: recvWindow
                    - text: cannot exceed 60000.
                - listitem [ref=e4714]:
                  - paragraph [ref=e4715]:
                    - text: New
                    - code [ref=e4716]: intervalLetter
                    - text: "values for headers:"
                  - list [ref=e4717]:
                    - listitem [ref=e4718]: SECOND => S
                    - listitem [ref=e4719]: MINUTE => M
                    - listitem [ref=e4720]: HOUR => H
                    - listitem [ref=e4721]: DAY => D
                - listitem [ref=e4722]:
                  - paragraph [ref=e4723]:
                    - text: New Headers
                    - code [ref=e4724]: X-MBX-USED-WEIGHT-(intervalNum)(intervalLetter)
                    - text: will give your current used request weight for the (intervalNum)(intervalLetter) rate limiter. For example, if there is a one minute request rate weight limiter set, you will get a
                    - code [ref=e4725]: X-MBX-USED-WEIGHT-1M
                    - text: header in the response. The legacy header
                    - code [ref=e4726]: X-MBX-USED-WEIGHT
                    - text: will still be returned and will represent the current used weight for the one minute request rate weight limit.
                - listitem [ref=e4727]:
                  - paragraph [ref=e4728]:
                    - text: New Header
                    - code [ref=e4729]: X-MBX-ORDER-COUNT-(intervalNum)(intervalLetter)
                    - text: that is updated on any valid order placement and tracks your current order count for the interval; rejected/unsuccessful orders are not guaranteed to have
                    - code [ref=e4730]: X-MBX-ORDER-COUNT-**
                    - text: headers in the response.
                  - list [ref=e4731]:
                    - listitem [ref=e4732]:
                      - text: Eg.
                      - code [ref=e4733]: X-MBX-ORDER-COUNT-1S
                      - text: for "orders per 1 second" and
                      - code [ref=e4734]: X-MBX-ORDER-COUNT-1D
                      - text: for orders per "one day"
                - listitem [ref=e4735]:
                  - paragraph [ref=e4736]:
                    - text: GET api/v1/depth now supports
                    - code [ref=e4737]: limit
                    - text: 5000 and 10000; weights are 50 and 100 respectively.
                - listitem [ref=e4738]:
                  - paragraph [ref=e4739]:
                    - text: GET api/v1/exchangeInfo has a new parameter
                    - code [ref=e4740]: ocoAllowed
                    - text: .
