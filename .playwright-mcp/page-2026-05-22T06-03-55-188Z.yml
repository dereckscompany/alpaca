                - text: .
              - paragraph [ref=e2408]:
                - text: The SBE schema has been updated with WebSocket API metadata without incrementing either
                - code [ref=e2409]: schemaId
                - text: or
                - code [ref=e2410]: version
                - text: .
              - paragraph [ref=e2411]:
                - text: Users using SBE only on the REST API may continue to use the SBE schema with git commit hash
                - link "128b94b2591944a536ae427626b795000100cf1d" [ref=e2412] [cursor=pointer]:
                  - /url: https://github.com/binance/binance-spot-api-docs/blob/128b94b2591944a536ae427626b795000100cf1d/sbe/schemas/spot_1_0.xml
                  - code [ref=e2413]: 128b94b2591944a536ae427626b795000100cf1d
                - text: or update to the newly-published SBE schema.
              - paragraph [ref=e2414]:
                - text: Users who want to use SBE on the WebSocket API must use the
                - link "newly-published SBE schema" [ref=e2415] [cursor=pointer]:
                  - /url: https://github.com/binance/binance-spot-api-docs/blob/becd4d44a09d94821d2dc761ba9197aae8b495c3/sbe/schemas/spot_1_0.xml
                - text: .
