                  - generic [ref=e3345]: "\"allowedSelfTradePreventionModes\": [ // What the allowed modes of selfTradePrevention are"
                  - generic [ref=e3346]: "\"NONE\","
                  - generic [ref=e3347]: "\"EXPIRE_TAKER\","
                  - generic [ref=e3348]: "\"EXPIRE_BOTH\","
