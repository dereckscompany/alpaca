                  - text: "#"
              - paragraph [ref=e1917]:
                - strong [ref=e1918]: "Notice:"
                - text: The changes below will be rolled out starting at
                - strong [ref=e1919]: 2024-12-12
                - text: and may take approximately a week to complete.
              - paragraph [ref=e1920]: General Changes
              - list [ref=e1921]:
                - listitem [ref=e1922]:
                  - text: "Timestamp parameters now reject values too far into the past or the future. To be specific, the parameter will be rejected if:"
                  - list [ref=e1923]:
                    - listitem [ref=e1924]:
                      - code [ref=e1925]: timestamp
                      - text: before 2017-01-01 (less than 1483228800000)
                    - listitem [ref=e1926]:
                      - code [ref=e1927]: timestamp
                      - text: is more than 10 seconds after the current time (e.g., if current time is 1729745280000 then it is an error to use 1729745291000 or greater)
                - listitem [ref=e1928]:
                  - text: If
                  - code [ref=e1929]: startTime
                  - text: and/or
                  - code [ref=e1930]: endTime
                  - text: values are outside of range, the values will be adjusted to fit the correct range.
                - listitem [ref=e1931]:
                  - text: The field for quote order quantity (
                  - code [ref=e1932]: origQuoteOrderQty
                  - text: ) has been added to responses that previously did not have it. Note that for order placement endpoints the field will only appear for requests with
                  - code [ref=e1933]: newOrderRespType
                  - text: set to
                  - code [ref=e1934]: RESULT
                  - text: or
                  - code [ref=e1935]: FULL
                  - text: .
                  - list [ref=e1936]:
