                  - text: "#"
              - paragraph [ref=e2277]:
                - text: The following changes have been postponed to take effect on
                - strong [ref=e2278]: April 25, 05:00 UTC
              - paragraph [ref=e2279]: "General changes:"
              - list [ref=e2280]:
                - listitem [ref=e2281]:
                  - text: Symbol permission information in Exchange Information responses has moved from field
                  - code [ref=e2282]: permissions
                  - text: to field
                  - code [ref=e2283]: permissionSets
                  - text: .
                - listitem [ref=e2284]:
                  - text: Field
                  - code [ref=e2285]: permissions
                  - text: will be empty and will be removed in a future release.
                - listitem [ref=e2286]:
                  - text: Previously,
                  - code [ref=e2287]: "\"permissions\":[\"SPOT\",\"MARGIN\"]"
                  - text: meant that you could place an order on the symbol if your account had
                  - code [ref=e2288]: SPOT
                  - text: or
                  - code [ref=e2289]: MARGIN
                  - text: permissions. The equivalent is
                  - code [ref=e2290]: "\"permissionSets\":[[\"SPOT\",\"MARGIN\"]]"
                  - text: . (Note the extra set of square brackets.) Each array of permissions inside the
                  - code [ref=e2291]: permissionSets
                  - text: array is called a "permission set".
                - listitem [ref=e2292]:
                  - text: Symbol permissions can now be more complex.
                  - code [ref=e2293]: "\"permissionSets\":[[\"SPOT\",\"MARGIN\"],[\"TRD_GRP_004\",\"TRD_GRP_005\"]]"
                  - text: means that you may place an order on the symbol if your account has SPOT or MARGIN permissions
                  - strong [ref=e2294]: and
                  - code [ref=e2295]: TRD_GRP_004
                  - text: or
                  - code [ref=e2296]: TRD_GRP_005
                  - text: permissions. There may be an arbitrary number of permission sets in a symbol's
                  - code [ref=e2297]: permissionSets
                  - text: .
              - paragraph [ref=e2298]: REST API
              - list [ref=e2299]:
                - listitem [ref=e2300]:
                  - code [ref=e2301]: otoAllowed
                  - text: will now appear on
                  - code [ref=e2302]: GET /api/v3/exchangeInfo
                  - text: ", that indicates if One-Triggers-the-Other (OTO) orders are supported on that symbol."
