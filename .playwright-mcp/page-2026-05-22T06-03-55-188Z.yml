              - paragraph [ref=e2017]: SBE
              - list [ref=e2018]:
                - listitem [ref=e2019]:
                  - text: A new schema 2:1
                  - link "spot_2_1.xml" [ref=e2020] [cursor=pointer]:
                    - /url: https://github.com/binance/binance-spot-api-docs/blob/master/sbe/schemas/spot_2_1.xml
                  - text: has been released. The current schema 2:0
                  - link "spot_2_0.xml" [ref=e2021] [cursor=pointer]:
                    - /url: https://github.com/binance/binance-spot-api-docs/blob/master/sbe/schemas/spot_2_0.xml
                  - text: will thus be deprecated, and retired from the API in 6 months as per our schema deprecation policy.
                - listitem [ref=e2022]: Schema 2:1 is a backward compatible update of schema 2:0. You will always receive payloads in 2:1 format when you request either schema 2:0 or 2:1.
                - listitem [ref=e2023]:
                  - text: "Changes in SBE schema 2:1:"
                  - list [ref=e2024]:
                    - listitem [ref=e2025]:
                      - text: New field
                      - code [ref=e2026]: origQuoteOrderQty
                      - text: "in order placement/cancellation responses (Note: Decoders generated using the 2:0 schema will skip this field.):"
                      - list [ref=e2027]:
                        - listitem [ref=e2028]:
                          - code [ref=e2029]: NewOrderResultResponse
                        - listitem [ref=e2030]:
                          - code [ref=e2031]: NewOrderFullResponse
                        - listitem [ref=e2032]:
                          - code [ref=e2033]: CancelOrderResponse
                        - listitem [ref=e2034]:
                          - code [ref=e2035]: NewOrderListResultResponse
                        - listitem [ref=e2036]:
                          - code [ref=e2037]: NewOrderListFullResponse
                        - listitem [ref=e2038]:
                          - code [ref=e2039]: CancelOrderListResponse
                    - listitem [ref=e2040]:
                      - text: "WebSocket API only: New field"
                      - code [ref=e2041]: userDataStream
                      - text: "in session status responses:"
                      - list [ref=e2042]:
                        - listitem [ref=e2043]:
                          - code [ref=e2044]: WebSocketSessionLogonResponse
                        - listitem [ref=e2045]:
                          - code [ref=e2046]: WebSocketSessionStatusResponse
                        - listitem [ref=e2047]:
                          - code [ref=e2048]: WebSocketSessionLogoutResponse
                    - listitem [ref=e2049]:
                      - text: "WebSocket API only: New messages for User Data Stream support:"
                      - list [ref=e2050]:
                        - listitem [ref=e2051]:
                          - code [ref=e2052]: UserDataStreamSubscribeResponse
                        - listitem [ref=e2053]:
                          - code [ref=e2054]: UserDataStreamUnsubscribeResponse
                        - listitem [ref=e2055]:
                          - code [ref=e2056]: BalanceUpdateEvent
                        - listitem [ref=e2057]:
                          - code [ref=e2058]: EventStreamTerminatedEvent
                        - listitem [ref=e2059]:
                          - code [ref=e2060]: ExecutionReportEvent
                        - listitem [ref=e2061]:
                          - code [ref=e2062]: ExternalLockUpdateEvent
                        - listitem [ref=e2063]:
                          - code [ref=e2064]: ListStatusEvent
                        - listitem [ref=e2065]:
                          - code [ref=e2066]: OutboundAccountPositionEvent
              - paragraph [ref=e2067]: WebSocket API
              - list [ref=e2068]:
                - listitem [ref=e2069]:
                  - text: You can now subscribe to User Data Stream events through your WebSocket API connection.
                  - list [ref=e2070]:
                    - listitem [ref=e2071]: "Note: This feature is only available for users of the Ed25519 API keys."
                    - listitem [ref=e2072]: "Note: New SBE schema 2:1 is required for User Data Stream subscriptions in SBE format."
                - listitem [ref=e2073]:
                  - text: "New requests:"
                  - list [ref=e2074]:
                    - listitem [ref=e2075]:
                      - code [ref=e2076]: userDataStream.subscribe
                    - listitem [ref=e2077]:
                      - code [ref=e2078]: userDataStream.unsubscribe
                - listitem [ref=e2079]:
                  - text: Changes to
                  - code [ref=e2080]: session.logon
                  - text: ","
                  - code [ref=e2081]: session.status
                  - text: ", and"
                  - code [ref=e2082]: session.logout
                  - list [ref=e2083]:
                    - listitem [ref=e2084]:
                      - text: Added a new field
                      - code [ref=e2085]: userDataStream
                      - text: indicating if the user data stream subscription is active.
                - listitem [ref=e2086]:
                  - text: Fixed a bug where you wouldn't receive a new listenKey using
                  - code [ref=e2087]: userDataStream.start
                  - text: after
                  - code [ref=e2088]: session.logon
              - paragraph [ref=e2089]: User Data Stream
              - list [ref=e2090]:
                - listitem [ref=e2091]:
                  - text: "WebSocket API only: New event"
                  - code [ref=e2092]: eventStreamTerminated
                  - text: is emitted when you either logout from your websocket session or you have unsubscribed from the user data stream.
                - listitem [ref=e2093]:
                  - text: New event
                  - code [ref=e2094]: externalLockUpdate
                  - text: is sent when your spot wallet balance is locked/unlocked by an external system.
              - paragraph [ref=e2095]: FIX API
              - list [ref=e2096]:
                - listitem [ref=e2097]:
                  - text: The
                  - link "schema" [ref=e2098] [cursor=pointer]:
                    - /url: https://github.com/binance/binance-spot-api-docs/blob/master/fix/schemas/spot-fix-oe.xml
                  - text: has been updated with a new Administrative message News <B>, which can be used for all FIX services. Receiving this message indicates that your connection is about to be closed.
              - paragraph [ref=e2099]:
                - text: The following changes will occur
                - strong [ref=e2100]: between 2024-12-16 to 2024-12-20
                - text: ":"
              - list [ref=e2101]:
                - listitem [ref=e2102]:
                  - text: Fixed a bug that prevented orders from being placed when submitting OCOs on the
                  - code [ref=e2103]: BUY
                  - text: side without providing a
                  - code [ref=e2104]: stopPrice
                  - text: .
                - listitem [ref=e2105]:
                  - code [ref=e2106]: TAKE_PROFIT
                  - text: and
                  - code [ref=e2107]: TAKE_PROFIT_LIMIT
                  - text: support has been added for OCOs.
                  - list [ref=e2108]:
                    - listitem [ref=e2109]:
                      - text: "Previously OCOs could only be composed by the following order types:"
                      - list [ref=e2110]:
                        - listitem [ref=e2111]:
                          - code [ref=e2112]: LIMIT_MAKER
                          - text: +
                          - code [ref=e2113]: STOP_LOSS
                        - listitem [ref=e2114]:
                          - code [ref=e2115]: LIMIT_MAKER
                          - text: +
                          - code [ref=e2116]: STOP_LOSS_LIMIT
                    - listitem [ref=e2117]:
                      - text: "Now OCOs can be composed of the following order types:"
                      - list [ref=e2118]:
                        - listitem [ref=e2119]:
                          - code [ref=e2120]: LIMIT_MAKER
                          - text: +
                          - code [ref=e2121]: STOP_LOSS
                        - listitem [ref=e2122]:
                          - code [ref=e2123]: LIMIT_MAKER
                          - text: +
                          - code [ref=e2124]: STOP_LOSS_LIMIT
                        - listitem [ref=e2125]:
                          - code [ref=e2126]: TAKE_PROFIT
                          - text: +
                          - code [ref=e2127]: STOP_LOSS
                        - listitem [ref=e2128]:
                          - code [ref=e2129]: TAKE_PROFIT
                          - text: +
                          - code [ref=e2130]: STOP_LOSS_LIMIT
                        - listitem [ref=e2131]:
                          - code [ref=e2132]: TAKE_PROFIT_LIMIT
                          - text: +
                          - code [ref=e2133]: STOP_LOSS
                        - listitem [ref=e2134]:
                          - code [ref=e2135]: TAKE_PROFIT_LIMIT
                          - text: +
                          - code [ref=e2136]: STOP_LOSS_LIMIT
                    - listitem [ref=e2137]:
                      - text: "This is supported by the following requests:"
                      - list [ref=e2138]:
                        - listitem [ref=e2139]:
                          - code [ref=e2140]: POST /api/v3/orderList/oco
                        - listitem [ref=e2141]:
                          - code [ref=e2142]: POST /api/v3/orderList/otoco
                        - listitem [ref=e2143]:
                          - code [ref=e2144]: orderList.place.oco
                        - listitem [ref=e2145]:
                          - code [ref=e2146]: orderList.place.otoco
                        - listitem [ref=e2147]:
                          - code [ref=e2148]: NewOrderList<E>
                    - listitem [ref=e2149]: Error code -1167 will be obsolete after this update and will be removed from the documentation in a later update.
