              - separator [ref=e2962]
              - heading "2023-07-18Direct link to 2023-07-18" [level=3] [ref=e2963]:
                - text: 2023-07-18
                - link "Direct link to 2023-07-18" [ref=e2964] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2023-07-18
                  - text: "#"
              - list [ref=e2965]:
                - listitem [ref=e2966]:
                  - text: New API key type – Ed25519 – is now supported. (UI support will be released this week.)
                  - list [ref=e2967]:
                    - listitem [ref=e2968]: Ed25519 API keys are an alternative to RSA API keys, using asymmetric cryptography to authenticate your requests on the API.
                    - listitem [ref=e2969]:
                      - strong [ref=e2970]: We recommend switching to Ed25519
                      - text: for improved performance and security.
                      - text: For more information, please refer to the
                      - link "API Key Types" [ref=e2971] [cursor=pointer]:
                        - /url: /docs/binance-spot-api-docs/faqs/api_key_types
                      - text: .
                - listitem [ref=e2972]: Documentation has been updated with how to sign a payload with Ed25519 keys.
              - separator [ref=e2973]
              - heading "2023-07-11Direct link to 2023-07-11" [level=3] [ref=e2974]:
                - text: 2023-07-11
                - link "Direct link to 2023-07-11" [ref=e2975] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2023-07-11
                  - text: "#"
              - paragraph [ref=e2976]:
                - strong [ref=e2977]: "Notice:"
                - text: The change below are being rolled out, and will take approximately a week to complete.
              - paragraph [ref=e2978]: "General Changes:"
              - list [ref=e2979]:
                - listitem [ref=e2980]:
                  - text: "Changes to error messages:"
                  - list [ref=e2981]:
                    - listitem [ref=e2982]: Previously, when duplicate symbols were passed to requests that do not allow it, the error would be "Mandatory parameter symbols was not sent, was empty/null, or malformed."
                    - listitem [ref=e2983]:
                      - text: Now, the error message is "Symbol is present multiple times in the list", with a new error code
                      - code [ref=e2984]: "-1151"
                    - listitem [ref=e2985]:
                      - text: "This affects the following requests:"
                      - list [ref=e2986]:
                        - listitem [ref=e2987]:
                          - code [ref=e2988]: GET /api/v3/exchangeInfo
                        - listitem [ref=e2989]:
                          - code [ref=e2990]: GET /api/v3/ticker/24hr
                        - listitem [ref=e2991]:
                          - code [ref=e2992]: GET /api/v3/ticker/price
                        - listitem [ref=e2993]:
                          - code [ref=e2994]: GET/api/v3/ticker/bookTicker
                        - listitem [ref=e2995]:
                          - code [ref=e2996]: exchangeInfo
                        - listitem [ref=e2997]:
                          - code [ref=e2998]: ticker.24hr
                        - listitem [ref=e2999]:
                          - code [ref=e3000]: ticker.price
                        - listitem [ref=e3001]:
                          - code [ref=e3002]: ticker.book
                - listitem [ref=e3003]: Fixed a bug where some non-archived orders being queried would receive the error code that their order was archived.
              - paragraph [ref=e3004]: Rest API
              - list [ref=e3005]:
                - listitem [ref=e3006]:
                  - text: Changes to
                  - code [ref=e3007]: GET /api/v3/account
                  - text: ":"
                  - list [ref=e3008]:
                    - listitem [ref=e3009]:
                      - text: New field
                      - code [ref=e3010]: preventSor
                      - text: will appear in the response.
                    - listitem [ref=e3011]:
                      - text: New field
                      - code [ref=e3012]: uid
                      - text: that shows the User Id/Account will appear in the response.
                - listitem [ref=e3013]:
                  - text: Changes to
                  - code [ref=e3014]: GET /api/v3/historicalTrades
                  - text: ":"
                  - list [ref=e3015]:
                    - listitem [ref=e3016]:
                      - text: Changed security type from
                      - code [ref=e3017]: MARKET_DATA
                      - text: to
                      - code [ref=e3018]: NONE
                      - text: .
                    - listitem [ref=e3019]:
                      - text: This means that the
                      - code [ref=e3020]: X-MBX-APIKEY
                      - text: header is no longer necessary and is now ignored.
              - paragraph [ref=e3021]: Websocket API
              - list [ref=e3022]:
                - listitem [ref=e3023]:
                  - text: Changes to
                  - code [ref=e3024]: account.status
                  - text: ":"
                  - list [ref=e3025]:
                    - listitem [ref=e3026]:
                      - text: New field
                      - code [ref=e3027]: preventSor
                      - text: will appear in the response.
                    - listitem [ref=e3028]:
                      - text: New field
                      - code [ref=e3029]: uid
                      - text: that shows the User Id/Account will appear in the response.
                - listitem [ref=e3030]:
                  - text: Changes to
                  - code [ref=e3031]: trades.historical
                  - text: ":"
                  - list [ref=e3032]:
                    - listitem [ref=e3033]:
                      - text: Changed security type from
                      - code [ref=e3034]: MARKET_DATA
                      - text: to
                      - code [ref=e3035]: NONE
                      - text: .
                    - listitem [ref=e3036]:
                      - text: This means that the
                      - code [ref=e3037]: apiKey
                      - text: parameter is no longer necessary and is now ignored.
              - paragraph [ref=e3038]:
                - strong [ref=e3039]:
                  - text: The following changes will take effect
                  - emphasis [ref=e3040]: approximately a week from the release date
                  - text: ":"
                - text: ":"
              - list [ref=e3041]:
                - listitem [ref=e3042]:
                  - text: Fixed multiple bugs with orders that use
                  - code [ref=e3043]: type=MARKET
                  - text: and
                  - code [ref=e3044]: quoteOrderQty
                  - text: ", also known as “reverse market orders”:"
                  - list [ref=e3045]:
                    - listitem [ref=e3046]: Reverse market orders are no longer partially filled, or filled for zero or negative quantity under extreme market conditions.
                    - listitem [ref=e3047]:
                      - code [ref=e3048]: MARKET_LOT_SIZE
                      - text: filter now correctly rejects reverse market orders that go over the symbol's
                      - code [ref=e3049]: maxQty
                      - text: .
                - listitem [ref=e3050]:
                  - text: Fixed a bug where OCO orders using
                  - code [ref=e3051]: trailingDelta
                  - text: could have an incorrect
                  - code [ref=e3052]: trailingTime
                  - text: value after either leg of the OCO is touched.
                - listitem [ref=e3053]:
                  - text: New field
                  - code [ref=e3054]: transactTime
                  - text: "will appear in order cancellation responses. This affects the following requests:"
                  - list [ref=e3055]:
                    - listitem [ref=e3056]:
                      - code [ref=e3057]: DELETE /api/v3/order
                    - listitem [ref=e3058]:
                      - code [ref=e3059]: POST /api/v3/order/cancelReplace
                    - listitem [ref=e3060]:
                      - code [ref=e3061]: DELETE /api/v3/openOrders
                    - listitem [ref=e3062]:
                      - code [ref=e3063]: DELETE /api/v3/orderList
                    - listitem [ref=e3064]:
                      - code [ref=e3065]: order.cancel
                    - listitem [ref=e3066]:
                      - code [ref=e3067]: order.cancelReplace
                    - listitem [ref=e3068]:
                      - code [ref=e3069]: openOrders.cancelAll
                    - listitem [ref=e3070]:
                      - code [ref=e3071]: orderList.cancel
              - separator [ref=e3072]
              - heading "2023-06-06Direct link to 2023-06-06" [level=3] [ref=e3073]:
                - text: 2023-06-06
                - link "Direct link to 2023-06-06" [ref=e3074] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2023-06-06
                  - text: "#"
              - list [ref=e3075]:
                - listitem [ref=e3076]:
                  - text: "A new endpoint is now available for redundancy:"
                  - strong [ref=e3077]:
                    - link "https://api-gcp.binance.com/" [ref=e3078] [cursor=pointer]:
                      - /url: https://api-gcp.binance.com/
                  - list [ref=e3079]:
                    - listitem [ref=e3080]:
                      - text: This is using the GCP (Google Cloud Platform) CDN and may have slower performance compared to
                      - code [ref=e3081]: api1
                      - text: "-"
                      - code [ref=e3082]: api4
                      - text: endpoints.
              - separator [ref=e3083]
              - heading "2023-05-26Direct link to 2023-05-26" [level=3] [ref=e3084]:
                - text: 2023-05-26
                - link "Direct link to 2023-05-26" [ref=e3085] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2023-05-26
                  - text: "#"
              - paragraph [ref=e3086]:
                - strong [ref=e3087]: "Notice:"
                - text: The change below are being rolled out, and will take approximately a week to complete.
              - list [ref=e3088]:
                - listitem [ref=e3089]:
                  - text: The following base endpoints may give better performance but have less stability than
                  - strong [ref=e3090]:
                    - link "https://api.binance.com" [ref=e3091] [cursor=pointer]:
                      - /url: https://api.binance.com
                  - text: ":"
                  - list [ref=e3092]:
                    - listitem [ref=e3093]:
                      - strong [ref=e3094]:
                        - link "https://api1.binance.com" [ref=e3095] [cursor=pointer]:
                          - /url: https://api1.binance.com
                    - listitem [ref=e3096]:
                      - strong [ref=e3097]:
                        - link "https://api2.binance.com" [ref=e3098] [cursor=pointer]:
                          - /url: https://api2.binance.com
                    - listitem [ref=e3099]:
                      - strong [ref=e3100]:
                        - link "https://api3.binance.com" [ref=e3101] [cursor=pointer]:
                          - /url: https://api3.binance.com
                    - listitem [ref=e3102]:
                      - strong [ref=e3103]:
                        - link "https://api4.binance.com" [ref=e3104] [cursor=pointer]:
                          - /url: https://api4.binance.com
              - separator [ref=e3105]
              - heading "2023-05-24Direct link to 2023-05-24" [level=3] [ref=e3106]:
                - text: 2023-05-24
                - link "Direct link to 2023-05-24" [ref=e3107] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2023-05-24
                  - text: "#"
              - list [ref=e3108]:
                - listitem [ref=e3109]:
                  - strong [ref=e3110]: The previous market data URLs have been deprecated. Please update your code immediately to prevent interruption of our services.
                  - list [ref=e3111]:
                    - listitem [ref=e3112]:
                      - text: API Market data from
                      - code [ref=e3113]: data.binance.com
                      - text: can now be accessed from
                      - code [ref=e3114]: data-api.binance.vision
                      - text: .
                    - listitem [ref=e3115]:
                      - text: Websocket Market Data from
                      - code [ref=e3116]: data-stream.binance.com
                      - text: can now be accessed from
                      - code [ref=e3117]: data-stream.binance.vision
                      - text: .
              - separator [ref=e3118]
              - heading "2023-03-13Direct link to 2023-03-13" [level=3] [ref=e3119]:
                - text: 2023-03-13
                - link "Direct link to 2023-03-13" [ref=e3120] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2023-03-13
                  - text: "#"
              - paragraph [ref=e3121]:
                - strong [ref=e3122]: "Notice:"
                - text: All changes are being rolled out gradually to all our servers, and may take a week to complete.
              - paragraph [ref=e3123]: GENERAL CHANGES
              - list [ref=e3124]:
                - listitem [ref=e3125]: The error messages for certain issues have been improved for easier troubleshooting.
              - table [ref=e3126]:
                - rowgroup [ref=e3127]:
                  - row "Situation Old Error Message New Error Message" [ref=e3128]:
                    - columnheader "Situation" [ref=e3129]
                    - columnheader "Old Error Message" [ref=e3130]
                    - columnheader "New Error Message" [ref=e3131]
                  - row "An account cannot place or cancel an order, due to trading ability disabled. This action is disabled on this account. This account may not place or cancel orders." [ref=e3132]:
                    - cell "An account cannot place or cancel an order, due to trading ability disabled." [ref=e3133]
                    - cell "This action is disabled on this account." [ref=e3134]
                    - cell "This account may not place or cancel orders." [ref=e3135]
                  - row "When the permissions configured on the symbol do not match the permissions on the account. This symbol is not permitted for this account." [ref=e3136]:
                    - cell "When the permissions configured on the symbol do not match the permissions on the account." [ref=e3137]
                    - cell "This symbol is not permitted for this account." [ref=e3138]
                  - row "When the account tries to place an order on a symbol it has no permissions for. This symbol is restricted for this account." [ref=e3139]:
                    - cell "When the account tries to place an order on a symbol it has no permissions for." [ref=e3140]
                    - cell "This symbol is restricted for this account." [ref=e3141]
                  - row "Placing an order when symbol is not TRADING. Unsupported order combination. This order type is not possible in this trading phase." [ref=e3142]:
                    - cell "Placing an order when symbol is not TRADING." [ref=e3143]
                    - cell "Unsupported order combination." [ref=e3144]
                    - cell "This order type is not possible in this trading phase." [ref=e3145]
                  - row "Placing an order with timeinForce=IOC or FOK on a trading phase that does not support it. Limit orders require GTC for this phase." [ref=e3146]:
                    - cell "Placing an order with timeinForce=IOC or FOK on a trading phase that does not support it." [ref=e3147]
                    - cell "Limit orders require GTC for this phase." [ref=e3148]
              - list [ref=e3149]:
                - listitem [ref=e3150]:
                  - text: "Fixed error message for querying archived orders:"
                  - list [ref=e3151]:
                    - listitem [ref=e3152]:
                      - text: Previously, if an archived order (i.e. order with status
                      - code [ref=e3153]: CANCELED
                      - text: or
                      - code [ref=e3154]: EXPIRED
                      - text: where
                      - code [ref=e3155]: executedQty
                      - text: "== 0 that occurred more than 90 days in the past.) is queried, the error message would be:"
                  - generic [ref=e3157]:
                    - code [ref=e3159]:
                      - generic [ref=e3160]: "{"
                      - generic [ref=e3161]: "\"code\": -2013,"
                      - generic [ref=e3162]: "\"msg\": \"Order does not exist.\""
                      - generic [ref=e3163]: "}"
                    - button "Copy code to clipboard" [ref=e3165] [cursor=pointer]:
                      - generic [ref=e3166]:
                        - img [ref=e3167]
                        - img [ref=e3169]
                  - list [ref=e3171]:
                    - listitem [ref=e3172]: "Now, the error message is:"
                  - generic [ref=e3174]:
                    - code [ref=e3176]:
                      - generic [ref=e3177]: "{"
                      - generic [ref=e3178]: "\"code\": -2026,"
                      - generic [ref=e3179]: "\"msg\": \"Order was canceled or expired with no executed qty over 90 days ago and has been archived.\""
                      - generic [ref=e3180]: "}"
                    - button "Copy code to clipboard" [ref=e3182] [cursor=pointer]:
                      - generic [ref=e3183]:
                        - img [ref=e3184]
                        - img [ref=e3186]
                - listitem [ref=e3188]:
                  - text: Behavior for API requests with
                  - code [ref=e3189]: startTime
                  - text: and
                  - code [ref=e3190]: endTime
                  - text: ":"
                  - list [ref=e3191]:
                    - listitem [ref=e3192]:
                      - text: Previously some requests failed if the
                      - code [ref=e3193]: startTime
                      - text: ==
                      - code [ref=e3194]: endTime
                      - text: .
                    - listitem [ref=e3195]:
                      - text: Now, all API requests that accept
                      - code [ref=e3196]: startTime
                      - text: and
                      - code [ref=e3197]: endTime
                      - text: "allow the parameters to be equal. This applies to the following requests:"
                      - list [ref=e3198]:
                        - listitem [ref=e3199]:
                          - text: Rest API
                          - list [ref=e3200]:
                            - listitem [ref=e3201]:
                              - code [ref=e3202]: GET /api/v3/aggTrades
                            - listitem [ref=e3203]:
                              - code [ref=e3204]: GET /api/v3/klines
                            - listitem [ref=e3205]:
                              - code [ref=e3206]: GET /api/v3/allOrderList
                            - listitem [ref=e3207]:
                              - code [ref=e3208]: GET /api/v3/allOrders
                            - listitem [ref=e3209]:
                              - code [ref=e3210]: GET /api/v3/myTrades
                        - listitem [ref=e3211]:
                          - text: Websocket API
                          - list [ref=e3212]:
                            - listitem [ref=e3213]:
                              - code [ref=e3214]: trades.aggregate
                            - listitem [ref=e3215]:
                              - code [ref=e3216]: klines
                            - listitem [ref=e3217]:
                              - code [ref=e3218]: allOrderList
                            - listitem [ref=e3219]:
                              - code [ref=e3220]: allOrders
                            - listitem [ref=e3221]:
                              - code [ref=e3222]: myTrades
                - listitem [ref=e3223]:
                  - text: Users connected to the websocket API will now be disconnected if their IP is banned due to violation of the IP rate limits (status
                  - code [ref=e3224]: "418"
                  - text: ).
              - paragraph [ref=e3225]:
                - text: The following changes will take effect
                - strong [ref=e3226]: approximately a week from the release date
                - text: ", but the rest of the documentation has been updated to reflect the future changes:"
              - list [ref=e3227]:
                - listitem [ref=e3228]:
                  - text: "Changes to Filter Evaluation:"
                  - list [ref=e3229]:
                    - listitem [ref=e3230]:
                      - text: "Previous behavior:"
                      - code [ref=e3231]: LOT_SIZE
                      - text: and
                      - code [ref=e3232]: MARKET_LOT_SIZE
                      - text: required that (
                      - code [ref=e3233]: quantity
                      - text: "-"
                      - code [ref=e3234]: minQty
                      - text: ) %
                      - code [ref=e3235]: stepSize
                      - text: == 0.
                    - listitem [ref=e3236]:
                      - text: "New behavior: This has now been changed to ("
                      - code [ref=e3237]: quantity
                      - text: "%"
                      - code [ref=e3238]: stepSize
                      - text: ) == 0.
                - listitem [ref=e3239]:
                  - text: Bug fix with reverse
                  - code [ref=e3240]: MARKET
                  - text: orders (i.e.,
                  - code [ref=e3241]: MARKET
                  - text: using
                  - code [ref=e3242]: quoteOrderQty
                  - text: "):"
                  - list [ref=e3243]:
                    - listitem [ref=e3244]:
                      - text: "Previous behavior: Reverse market orders would always have the status"
                      - code [ref=e3245]: FILLED
                      - text: even if the order did not fully fill due to low liquidity.
                    - listitem [ref=e3246]:
                      - text: "New behavior: If the reverse market order did not fully fill due to low liquidity the order status will be"
                      - code [ref=e3247]: EXPIRED
                      - text: ", and"
                      - code [ref=e3248]: FILLED
                      - text: only if the order was completely filled.
              - paragraph [ref=e3249]: REST API
              - list [ref=e3250]:
                - listitem [ref=e3251]:
                  - text: Changes to
                  - code [ref=e3252]: DELETE /api/v3/order
                  - text: and
                  - code [ref=e3253]: POST /api/v3/order/cancelReplace
                  - text: ":"
                  - list [ref=e3254]:
                    - listitem [ref=e3255]:
                      - text: A new optional parameter
                      - code [ref=e3256]: cancelRestrictions
                      - text: that determines whether the cancel will succeed if the order status is
                      - code [ref=e3257]: NEW
                      - text: or
                      - code [ref=e3258]: PARTIALLY_FILLED
                      - text: .
                    - listitem [ref=e3259]:
                      - text: If the order cancellation fails due to
                      - code [ref=e3260]: cancelRestrictions
                      - text: ", the error will be:"
                  - generic [ref=e3262]:
                    - code [ref=e3264]:
                      - generic [ref=e3265]: "{"
                      - generic [ref=e3266]: "\"code\": -2011,"
                      - generic [ref=e3267]: "\"msg\": \"Order was not canceled due to cancel restrictions.\""
                      - generic [ref=e3268]: "}"
                    - button "Copy code to clipboard" [ref=e3270] [cursor=pointer]:
                      - generic [ref=e3271]:
                        - img [ref=e3272]
                        - img [ref=e3274]
              - paragraph [ref=e3276]: WEBSOCKET API
              - list [ref=e3277]:
                - listitem [ref=e3278]:
                  - text: Changes to
                  - code [ref=e3279]: order.cancel
                  - text: and
                  - code [ref=e3280]: order.cancelReplace
                  - text: ":"
                  - list [ref=e3281]:
                    - listitem [ref=e3282]:
                      - text: A new optional parameter
                      - code [ref=e3283]: cancelRestrictions
                      - text: that determines whether the cancel will succeed if the order status is
                      - code [ref=e3284]: NEW
                      - text: or
                      - code [ref=e3285]: PARTIALLY_FILLED
                      - text: .
                    - listitem [ref=e3286]:
                      - text: If the order cancellation fails due to
                      - code [ref=e3287]: cancelRestrictions
                      - text: ", the error will be:"
                  - generic [ref=e3289]:
                    - code [ref=e3291]:
                      - generic [ref=e3292]: "{"
                      - generic [ref=e3293]: "\"code\": -2011,"
                      - generic [ref=e3294]: "\"msg\": \"Order was not canceled due to cancel restrictions.\""
                      - generic [ref=e3295]: "}"
                    - button "Copy code to clipboard" [ref=e3297] [cursor=pointer]:
