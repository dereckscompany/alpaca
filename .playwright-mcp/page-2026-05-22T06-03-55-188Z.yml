              - separator [ref=e3489]
              - heading "2022-12-28Direct link to 2022-12-28" [level=3] [ref=e3490]:
                - text: 2022-12-28
                - link "Direct link to 2022-12-28" [ref=e3491] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2022-12-28
                  - text: "#"
              - list [ref=e3492]:
                - listitem [ref=e3493]: SPOT WebSocket API documentation has been updated to show how to sign a request using an RSA key.
              - separator [ref=e3494]
              - heading "2022-12-26Direct link to 2022-12-26" [level=3] [ref=e3495]:
                - text: 2022-12-26
                - link "Direct link to 2022-12-26" [ref=e3496] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2022-12-26
                  - text: "#"
              - list [ref=e3497]:
                - listitem [ref=e3498]: Spot WebSocket API is now available on the live exchange.
                - listitem [ref=e3499]:
                  - text: "Spot Websocket API can be accessed through this URL:"
                  - code [ref=e3500]: wss://ws-api.binance.com/ws-api/v3
              - separator [ref=e3501]
              - heading "2022-12-15Direct link to 2022-12-15" [level=3] [ref=e3502]:
                - text: 2022-12-15
                - link "Direct link to 2022-12-15" [ref=e3503] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2022-12-15
                  - text: "#"
              - list [ref=e3504]:
                - listitem [ref=e3505]:
                  - text: New RSA signature
                  - list [ref=e3506]:
                    - listitem [ref=e3507]: Documentation has been updated to show how to create RSA keys.
                    - listitem [ref=e3508]: For security reasons, we recommend to use RSA keys instead of HMAC keys when generating an API key.
                    - listitem [ref=e3509]:
                      - text: We accept
                      - code [ref=e3510]: PKCS#8
                      - text: (BEGIN PUBLIC KEY).
                    - listitem [ref=e3511]: More details on how to upload your RSA public key will be added at a later date.
                - listitem [ref=e3512]:
                  - text: SPOT WebSocket API is now available on
                  - strong [ref=e3513]: SPOT Testnet
                  - text: .
                  - list [ref=e3514]:
                    - listitem [ref=e3515]: WebSocket API allows placing orders, canceling orders, etc. through a WebSocket connection.
                    - listitem [ref=e3516]:
                      - text: WebSocket API is a
                      - strong [ref=e3517]: separate
                      - text: service from WebSocket Market Data streams. I.e., placing orders and listening to market data requires two separate WebSocket connections.
                    - listitem [ref=e3518]: WebSocket API is subject to the same Filter and Rate Limit rules as REST API.
                    - listitem [ref=e3519]: "WebSocket API and REST API are functionally equivalent: they provide the same features, accept the same parameters, return the same status and error codes."
              - paragraph [ref=e3520]:
                - strong [ref=e3521]: WEBSOCKET API WILL BE AVAILABLE ON THE LIVE EXCHANGE AT A LATER DATE.
              - separator [ref=e3522]
              - heading "2022-12-13Direct link to 2022-12-13" [level=3] [ref=e3523]:
                - text: 2022-12-13
                - link "Direct link to 2022-12-13" [ref=e3524] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2022-12-13
                  - text: "#"
              - paragraph [ref=e3525]: REST API
              - paragraph [ref=e3526]:
                - text: Some error messages on error code
                - code [ref=e3527]: "-1003"
                - text: have changed.
              - list [ref=e3528]:
                - listitem [ref=e3529]:
                  - text: "Previous error message:"
                  - code [ref=e3530]: Too much request weight used; current limit is %s request weight per %s %s. Please use the websocket for live updates to avoid polling the API.
                  - text: "has been updated to:"
              - generic [ref=e3532]:
                - code [ref=e3534]:
                  - generic [ref=e3535]: Too much request weight used; current limit is %s request weight per %s. Please use WebSocket Streams for live updates to avoid polling the API.
                - button "Copy code to clipboard" [ref=e3537] [cursor=pointer]:
                  - generic [ref=e3538]:
                    - img [ref=e3539]
                    - img [ref=e3541]
              - list [ref=e3543]:
                - listitem [ref=e3544]:
                  - text: Previous error message
                  - code [ref=e3545]: Way too much request weight used; IP banned until %s. Please use the websocket for live updates to avoid bans.
                  - text: "has been updated to:"
              - generic [ref=e3547]:
                - code [ref=e3549]:
                  - generic [ref=e3550]: Way too much request weight used; IP banned until %s. Please use WebSocket Streams for live updates to avoid bans.
                - button "Copy code to clipboard" [ref=e3552] [cursor=pointer]:
                  - generic [ref=e3553]:
                    - img [ref=e3554]
                    - img [ref=e3556]
              - separator [ref=e3558]
              - heading "2022-12-05Direct link to 2022-12-05" [level=3] [ref=e3559]:
                - text: 2022-12-05
                - link "Direct link to 2022-12-05" [ref=e3560] [cursor=pointer]:
                  - /url: /docs/binance-spot-api-docs#2022-12-05
                  - text: "#"
              - paragraph [ref=e3561]:
                - strong [ref=e3562]: "Notice:"
                - text: These changes are being rolled out gradually to all our servers, and will take approximately a week to complete.
              - paragraph [ref=e3563]: WEBSOCKET
              - list [ref=e3564]:
                - listitem [ref=e3565]:
                  - code [ref=e3566]: "!bookTicker"
                  - text: will be removed by
                  - strong [ref=e3567]: December 7, 2022
                  - text: . Please use the Individual Book Ticker Streams instead (
                  - code [ref=e3568]: <symbol>@bookTicker
                  - text: ).
                  - list [ref=e3569]:
                    - listitem [ref=e3570]:
                      - text: Multiple
                      - code [ref=e3571]: <symbol>@bookTicker
                      - text: streams can be subscribed to over one connection. (E.g.
                      - code [ref=e3572]: wss://stream.binance.com:9443/stream?streams=btcusdt@bookTicker/bnbbtc@bookTicker
                      - text: )
              - paragraph [ref=e3573]: REST API
              - list [ref=e3574]:
                - listitem [ref=e3575]:
                  - text: New error code
                  - code [ref=e3576]: "-1135"
                  - list [ref=e3577]:
                    - listitem [ref=e3578]: This error code will occur if a parameter requiring a JSON object is invalid.
                - listitem [ref=e3579]:
                  - text: New error code
                  - code [ref=e3580]: "-1108"
                  - list [ref=e3581]:
                    - listitem [ref=e3582]: This error will occur if a value to a parameter being sent was too large, potentially causing overflow.
                    - listitem [ref=e3583]:
                      - text: "This error code can occur in the following endpoints:"
                      - list [ref=e3584]:
                        - listitem [ref=e3585]:
                          - code [ref=e3586]: POST /api/v3/order
                        - listitem [ref=e3587]:
                          - code [ref=e3588]: POST /api/v3/order/cancelReplace
                        - listitem [ref=e3589]:
                          - code [ref=e3590]: POST /api/v3/order/oco
                - listitem [ref=e3591]:
                  - text: Changes to
                  - code [ref=e3592]: GET /api/v3/aggTrades
                  - list [ref=e3593]:
                    - listitem [ref=e3594]:
                      - text: "Previous behavior:"
                      - code [ref=e3595]: startTime
                      - text: and
                      - code [ref=e3596]: endTime
                      - text: had to be used in combination and could only be an hour apart.
                    - listitem [ref=e3597]:
                      - text: "New behavior:"
                      - code [ref=e3598]: startTime
                      - text: and
                      - code [ref=e3599]: endTime
                      - text: can be used individually and the 1 hour limit has been removed.
                      - list [ref=e3600]:
                        - listitem [ref=e3601]:
                          - text: When using
                          - code [ref=e3602]: startTime
                          - text: only, this will return trades from that time, up to the
                          - code [ref=e3603]: limit
                          - text: provided.
                        - listitem [ref=e3604]:
                          - text: When using
                          - code [ref=e3605]: endTime
                          - text: only, this will return trades before that time, up to the
                          - code [ref=e3606]: limit
                          - text: provided.
                        - listitem [ref=e3607]:
                          - text: If
                          - code [ref=e3608]: limit
                          - text: not provided, regardless of used in combination or sent individually, the endpoint will use the default limit.
                - listitem [ref=e3609]:
                  - text: Changes to
                  - code [ref=e3610]: GET /api/v3/myTrades
                  - list [ref=e3611]:
                    - listitem [ref=e3612]:
                      - paragraph [ref=e3613]:
                        - text: Fixed a bug where
                        - code [ref=e3614]: symbol
                        - text: +
                        - code [ref=e3615]: orderId
                        - text: combination would return all trades even if the number of trades went beyond the
                        - code [ref=e3616]: "500"
                        - text: default limit.
                    - listitem [ref=e3617]:
                      - paragraph [ref=e3618]: "Previous behavior: The API would send specific error messages depending on the combination of parameters sent. E.g:"
                      - generic [ref=e3620]:
                        - code [ref=e3622]:
                          - generic [ref=e3623]: "{"
                          - generic [ref=e3624]: "\"code\": -1106,"
                          - generic [ref=e3625]: "\"msg\": \"Parameter X was sent when not required.\""
                          - generic [ref=e3626]: "}"
                        - button "Copy code to clipboard" [ref=e3628] [cursor=pointer]:
                          - generic [ref=e3629]:
                            - img [ref=e3630]
                            - img [ref=e3632]
                    - listitem [ref=e3634]:
                      - paragraph [ref=e3635]: "New behavior: If the combinations of optional parameters to the endpoint were not supported, then the endpoint will respond with the generic error:"
                      - generic [ref=e3637]:
                        - code [ref=e3639]:
                          - generic [ref=e3640]: "{"
                          - generic [ref=e3641]: "\"code\": -1128,"
                          - generic [ref=e3642]: "\"msg\": \"Combination of optional parameters invalid.\""
                          - generic [ref=e3643]: "}"
                        - button "Copy code to clipboard" [ref=e3645] [cursor=pointer]:
                          - generic [ref=e3646]:
                            - img [ref=e3647]
                            - img [ref=e3649]
                    - listitem [ref=e3651]:
                      - paragraph [ref=e3652]:
                        - text: "Added a new combination of supported parameters:"
                        - code [ref=e3653]: symbol
                        - text: +
                        - code [ref=e3654]: orderId
                        - text: +
                        - code [ref=e3655]: fromId
                        - text: .
                    - listitem [ref=e3656]:
                      - paragraph [ref=e3657]:
                        - text: The following combinations of parameters were previously supported but no longer accepted, as these combinations were only taking
                        - code [ref=e3658]: fromId
                        - text: into consideration, ignoring
                        - code [ref=e3659]: startTime
                        - text: and
                        - code [ref=e3660]: endTime
                        - text: ":"
                      - list [ref=e3661]:
                        - listitem [ref=e3662]:
                          - code [ref=e3663]: symbol
                          - text: +
                          - code [ref=e3664]: fromId
                          - text: +
                          - code [ref=e3665]: startTime
                        - listitem [ref=e3666]:
                          - code [ref=e3667]: symbol
                          - text: +
                          - code [ref=e3668]: fromId
                          - text: +
                          - code [ref=e3669]: endTime
                        - listitem [ref=e3670]:
                          - code [ref=e3671]: symbol
                          - text: +
                          - code [ref=e3672]: fromId
                          - text: +
                          - code [ref=e3673]: startTime
                          - text: +
                          - code [ref=e3674]: endTime
                    - listitem [ref=e3675]:
                      - paragraph [ref=e3676]: "Thus, these are the supported combinations of parameters:"
                      - list [ref=e3677]:
