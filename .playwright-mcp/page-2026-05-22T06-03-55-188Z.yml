              - paragraph [ref=e3306]:
                - strong [ref=e3307]: Changes to Websocket Limits
              - paragraph [ref=e3308]: The WS-API and Websocket Stream now only allows 300 connections requests every 5 minutes.
              - paragraph [ref=e3309]:
                - text: This limit is
                - strong [ref=e3310]: per IP address
                - text: .
              - paragraph [ref=e3311]: Please be careful when trying to open multiple connections or reconnecting to the Websocket API.
              - separator [ref=e3312]
              - heading "2023-01-26Direct link to 2023-01-26" [level=3] [ref=e3313]:
