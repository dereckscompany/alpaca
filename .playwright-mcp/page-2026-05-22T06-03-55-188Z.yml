                  - /url: /docs/binance-spot-api-docs#2024-02-28
                  - text: "#"
              - paragraph [ref=e2398]:
                - strong [ref=e2399]: This will take effect on March 5, 2024.
              - paragraph [ref=e2400]: Simple Binary Encoding (SBE) will be added to the live exchange, both for the Rest API and WebSocket API.
              - paragraph [ref=e2401]:
                - text: For more information on SBE, please refer to the
