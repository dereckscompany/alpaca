                  - text: "#"
              - list [ref=e2224]:
                - listitem [ref=e2225]:
                  - text: "On"
                  - strong [ref=e2226]: June 11, 05:00 UTC
                  - text: ", One-Triggers-the-Other (OTO) orders and One-Triggers-a-One-Cancels-The-Other (OTOCO) orders will be enabled. (Note this may take a few hours to be rolled out to all servers.)"
                  - list [ref=e2227]:
                    - listitem [ref=e2228]:
                      - text: "New requests have been added:"
                      - list [ref=e2229]:
                        - listitem [ref=e2230]:
                          - text: "REST API:"
                          - list [ref=e2231]:
                            - listitem [ref=e2232]:
                              - code [ref=e2233]: POST /api/v3/orderList/oto
                            - listitem [ref=e2234]:
                              - code [ref=e2235]: POST /api/v3/orderList/otoco
                        - listitem [ref=e2236]:
                          - text: "WebSocket API:"
                          - list [ref=e2237]:
                            - listitem [ref=e2238]:
                              - code [ref=e2239]: orderList.place.oto
                            - listitem [ref=e2240]:
                              - code [ref=e2241]: orderList.place.otoco
                - listitem [ref=e2242]:
                  - text: "On"
