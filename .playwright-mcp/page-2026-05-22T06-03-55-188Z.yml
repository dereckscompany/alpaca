                - text: ", Self Trade Prevention will be enabled at"
                - strong [ref=e3317]: 2023-01-26 08:00 UTC
                - text: .
              - paragraph [ref=e3318]:
                - text: Please refer to
                - code [ref=e3319]: GET /api/v3/exchangeInfo
                - text: from the Rest API or
                - code [ref=e3320]: exchangeInfo
                - text: from the Websocket API on the default and allowed modes.
