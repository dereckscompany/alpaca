                - listitem [ref=e1104]:
                  - strong [ref=e1105]:
                    - text: "SBE: A new schema 3:1 ("
                    - link "spot_3_1.xml" [ref=e1106] [cursor=pointer]:
                      - /url: https://github.com/binance/binance-spot-api-docs/blob/master/sbe/schemas/spot_3_1.xml
                    - text: ) is available.
                  - list [ref=e1107]:
                    - listitem [ref=e1108]:
                      - text: The current schema 3:0 (
                      - link "spot_3_0.xml" [ref=e1109] [cursor=pointer]:
                        - /url: https://github.com/binance/binance-spot-api-docs/blob/master/sbe/schemas/spot_3_0.xml
                      - text: ) is deprecated and will retire in 6 months as per our schema deprecation policy.
                    - listitem [ref=e1110]:
                      - text: "Changes in schema 3:1:"
                      - list [ref=e1111]:
                        - listitem [ref=e1112]:
                          - code [ref=e1113]: ExchangeInfoResponse
                          - text: ": new field"
                          - code [ref=e1114]: pegInstructionsAllowed
                        - listitem [ref=e1115]:
                          - code [ref=e1116]: ExecutionReportEvent
                          - text: ": new fields"
                          - code [ref=e1117]: pricePeg
                          - text: ","
                          - code [ref=e1118]: pricePegOffsetLevel
                          - text: ","
                          - code [ref=e1119]: peggedPrice
                        - listitem [ref=e1120]:
                          - code [ref=e1121]: UserDataStreamSubscribeResponse
                          - text: ": new field"
                          - code [ref=e1122]: subscriptionId
                        - listitem [ref=e1123]:
                          - text: New field
                          - code [ref=e1124]: subscriptionId
                          - text: for all user data stream events.
                        - listitem [ref=e1125]:
                          - text: Field
                          - code [ref=e1126]: apiKey
                          - text: renamed to
                          - code [ref=e1127]: loggedOnApiKey
                          - text: for
                          - code [ref=e1128]: WebSocketSessionLogonResponse
                          - text: ","
                          - code [ref=e1129]: WebSocketSessionStatusResponse
                          - text: and
                          - code [ref=e1130]: WebSocketSessionLogoutResponse
                        - listitem [ref=e1131]:
                          - code [ref=e1132]: OrderTestWithCommissionsResponse
                          - text: ": 2 new fields"
                          - code [ref=e1133]: specialCommissionForOrderMaker
                          - text: and
                          - code [ref=e1134]: specialCommissionForOrderTaker
                        - listitem [ref=e1135]:
                          - code [ref=e1136]: AccountCommissionResponse
                          - text: ": 4 new fields"
                          - code [ref=e1137]: specialCommissionMaker
                          - text: ","
                          - code [ref=e1138]: specialCommissionTaker
                          - text: ","
                          - code [ref=e1139]: specialCommissionBuyer
                          - text: and
                          - code [ref=e1140]: specialCommissionSeller
                        - listitem [ref=e1141]:
                          - text: Support for
                          - code [ref=e1142]: EXCHANGE_MAX_NUM_ORDER_LISTS
                          - text: ","
                          - code [ref=e1143]: MAX_NUM_ORDER_LISTS
                          - text: ", and"
                          - code [ref=e1144]: MAX_NUM_ORDER_AMENDS
                          - text: filters.
                        - listitem [ref=e1145]:
                          - code [ref=e1146]: ExecutionReportEvent
                          - text: ": fields"
                          - code [ref=e1147]: rejectReason
                          - text: and
                          - code [ref=e1148]: origClientOrderId
                          - text: now show their default values in SBE format to match the JSON format.
                        - listitem [ref=e1149]:
                          - code [ref=e1150]: NonRepresentableMessage
                          - text: ": New message added to represent a message that cannot be represented in this schema ID and version. Receipt of this message indicates that something should be available, but it is not representable using the SBE schema currently in use."
                - listitem [ref=e1151]:
                  - text: Orders with cumulative quantity of 0 in the final state
                  - code [ref=e1152]: EXPIRED_IN_MATCH
                  - text: (i.e., the order expired due to STP) will be archived after 90 days.
                - listitem [ref=e1153]:
                  - text: Query order lists requests will first query the data in the cache, and if it cannot be found, will query the database.
                  - list [ref=e1154]:
                    - listitem [ref=e1155]:
                      - text: "REST API:"
                      - code [ref=e1156]: GET /api/v3/openOrderLists
                    - listitem [ref=e1157]:
                      - text: "WebSocket API:"
